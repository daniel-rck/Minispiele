<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; flex-direction: column; gap: 16px; user-select: none; padding: 20px; }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  #stats { display: flex; gap: 24px; font-size: 1rem; padding: 8px 24px; background: #16213e; border: 1px solid #0f3460; border-radius: 8px; }
  .val { color: #c9b458; font-weight: bold; }
  #quiz-box { max-width: 600px; width: 100%; background: #16213e; border: 2px solid #0f3460; border-radius: 12px; padding: 24px; }
  #category { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  #question { font-size: 1.2rem; color: #e0e0e0; margin-bottom: 20px; line-height: 1.5; }
  #answers { display: flex; flex-direction: column; gap: 10px; }
  .answer { padding: 14px 18px; background: #0f1a30; border: 2px solid #0f3460; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
  .answer:hover { border-color: #c9b458; background: #162040; }
  .answer .letter { display: inline-flex; justify-content: center; align-items: center; width: 28px; height: 28px; background: #0f3460; border-radius: 50%; font-weight: bold; font-size: 0.85rem; color: #c9b458; flex-shrink: 0; }
  .answer.correct { border-color: #2ecc71; background: #1a3a2e; }
  .answer.correct .letter { background: #2ecc71; color: #fff; }
  .answer.wrong { border-color: #e74c3c; background: #3a1a1a; }
  .answer.wrong .letter { background: #e74c3c; color: #fff; }
  .answer.disabled { pointer-events: none; opacity: 0.6; }
  .answer.disabled.correct { opacity: 1; }
  #progress { width: 100%; height: 6px; background: #0f3460; border-radius: 3px; overflow: hidden; margin-top: 12px; }
  #progress-bar { height: 100%; background: #c9b458; transition: width 0.3s; border-radius: 3px; }
  #result { text-align: center; display: none; }
  #result h2 { color: #c9b458; font-size: 1.5rem; margin-bottom: 10px; }
  #result .big-score { font-size: 3rem; color: #c9b458; font-weight: bold; }
  .controls button { background: #16213e; color: #c9b458; border: 1px solid #0f3460; border-radius: 6px; padding: 8px 20px; font-size: 1rem; cursor: pointer; margin-top: 12px; }
  .controls button:hover { background: #0f3460; }
  a.back-link { position: fixed; top: 16px; left: 16px; color: #c9b458; text-decoration: none; font-size: 1.1rem; padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px; background: #16213e; transition: background 0.2s; z-index: 100; }
  a.back-link:hover { background: #0f3460; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>ALLGEMEINWISSEN</h1>
<div id="stats">
  <span>Frage: <span class="val" id="qNum">1</span>/10</span>
  <span>Richtig: <span class="val" id="correct">0</span></span>
  <span>Rekord: <span class="val" id="high">0</span>/10</span>
</div>
<div id="quiz-box">
  <div id="category"></div>
  <div id="question"></div>
  <div id="answers"></div>
  <div id="progress"><div id="progress-bar" style="width:0%"></div></div>
</div>
<div id="result">
  <h2>Quiz beendet</h2>
  <div class="big-score" id="final-score"></div>
  <p id="final-msg"></p>
  <div class="controls"><button onclick="startQuiz()">Nochmal spielen</button></div>
</div>

<script>
const QUESTIONS = [
  { cat: 'Geografie', q: 'Welches ist das größte Land der Welt?', a: ['Russland','China','Kanada','USA'], c: 0 },
  { cat: 'Geografie', q: 'Welcher Fluss ist der längste Europas?', a: ['Donau','Wolga','Rhein','Elbe'], c: 1 },
  { cat: 'Geografie', q: 'Wie heißt die Hauptstadt von Australien?', a: ['Sydney','Melbourne','Canberra','Brisbane'], c: 2 },
  { cat: 'Geografie', q: 'In welchem Land liegt der Kilimandscharo?', a: ['Kenia','Tansania','Uganda','Äthiopien'], c: 1 },
  { cat: 'Geschichte', q: 'In welchem Jahr fiel die Berliner Mauer?', a: ['1987','1988','1989','1990'], c: 2 },
  { cat: 'Geschichte', q: 'Wer erfand den Buchdruck?', a: ['Gutenberg','Luther','Dürer','Kopernikus'], c: 0 },
  { cat: 'Geschichte', q: 'Welches antike Weltwunder steht noch heute?', a: ['Koloss von Rhodos','Pyramiden von Gizeh','Leuchtturm von Alexandria','Hängende Gärten'], c: 1 },
  { cat: 'Geschichte', q: 'Wann begann der Erste Weltkrieg?', a: ['1912','1914','1916','1918'], c: 1 },
  { cat: 'Wissenschaft', q: 'Welches chemische Element hat das Symbol "Fe"?', a: ['Fluor','Francium','Eisen','Fermium'], c: 2 },
  { cat: 'Wissenschaft', q: 'Wie viele Planeten hat unser Sonnensystem?', a: ['7','8','9','10'], c: 1 },
  { cat: 'Wissenschaft', q: 'Was ist die härteste natürliche Substanz?', a: ['Gold','Stahl','Diamant','Titan'], c: 2 },
  { cat: 'Wissenschaft', q: 'Welches Gas macht den größten Teil der Atmosphäre aus?', a: ['Sauerstoff','Stickstoff','Kohlendioxid','Argon'], c: 1 },
  { cat: 'Kultur', q: 'Wer malte die Mona Lisa?', a: ['Michelangelo','Raphael','Leonardo da Vinci','Botticelli'], c: 2 },
  { cat: 'Kultur', q: 'Welche Sprache hat weltweit die meisten Muttersprachler?', a: ['Englisch','Spanisch','Mandarin','Hindi'], c: 2 },
  { cat: 'Kultur', q: 'In welcher Stadt steht die Freiheitsstatue?', a: ['Washington','New York','Boston','Philadelphia'], c: 1 },
  { cat: 'Natur', q: 'Welches Tier ist das schnellste an Land?', a: ['Löwe','Gepard','Antilope','Pferd'], c: 1 },
  { cat: 'Natur', q: 'Wie viele Beine hat eine Spinne?', a: ['6','8','10','12'], c: 1 },
  { cat: 'Natur', q: 'Welcher Ozean ist der größte?', a: ['Atlantik','Indischer Ozean','Pazifik','Arktischer Ozean'], c: 2 },
  { cat: 'Sport', q: 'Wie lange dauert ein Fußballspiel regulär?', a: ['80 Min.','90 Min.','100 Min.','120 Min.'], c: 1 },
  { cat: 'Sport', q: 'In welcher Sportart gibt es einen Korbleger?', a: ['Handball','Volleyball','Basketball','Tennis'], c: 2 },
  { cat: 'Technik', q: 'Wofür steht die Abkürzung HTML?', a: ['HyperText Markup Language','High Tech Modern Language','Home Tool Markup Language','Hyper Transfer Meta Language'], c: 0 },
  { cat: 'Technik', q: 'Wer gründete Apple?', a: ['Bill Gates','Steve Jobs','Mark Zuckerberg','Jeff Bezos'], c: 1 },
  { cat: 'Musik', q: 'Wie viele Tasten hat ein Standard-Klavier?', a: ['76','85','88','92'], c: 2 },
  { cat: 'Musik', q: 'Aus welchem Land stammt Mozart?', a: ['Deutschland','Schweiz','Österreich','Italien'], c: 2 },
];

const TOTAL_Q = 10;
let questions, currentQ, correctCount, answered;
let highScore = parseInt(localStorage.getItem('quiz-high') || '0');

document.getElementById('high').textContent = highScore;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  questions = shuffle([...QUESTIONS]).slice(0, TOTAL_Q);
  currentQ = 0;
  correctCount = 0;
  answered = false;
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz-box').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQ];
  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('correct').textContent = correctCount;
  document.getElementById('category').textContent = q.cat;
  document.getElementById('question').textContent = q.q;
  document.getElementById('progress-bar').style.width = ((currentQ) / TOTAL_Q * 100) + '%';
  answered = false;

  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.a.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'answer';
    div.innerHTML = `<span class="letter">${letters[i]}</span><span>${a}</span>`;
    div.onclick = () => selectAnswer(i);
    answersEl.appendChild(div);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[currentQ];
  const answers = document.querySelectorAll('.answer');

  answers.forEach((a, i) => {
    a.classList.add('disabled');
    if (i === q.c) a.classList.add('correct');
    if (i === idx && idx !== q.c) a.classList.add('wrong');
  });

  if (idx === q.c) correctCount++;
  document.getElementById('correct').textContent = correctCount;

  setTimeout(() => {
    currentQ++;
    if (currentQ >= TOTAL_Q) {
      endQuiz();
    } else {
      showQuestion();
    }
  }, 1200);
}

function endQuiz() {
  document.getElementById('quiz-box').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('final-score').textContent = `${correctCount}/${TOTAL_Q}`;
  document.getElementById('progress-bar').style.width = '100%';

  if (correctCount > highScore) {
    highScore = correctCount;
    localStorage.setItem('quiz-high', highScore);
    document.getElementById('high').textContent = highScore;
  }

  let msg = '';
  if (correctCount === TOTAL_Q) msg = 'Perfekt! Alle richtig!';
  else if (correctCount >= 8) msg = 'Ausgezeichnet!';
  else if (correctCount >= 6) msg = 'Gut gemacht!';
  else if (correctCount >= 4) msg = 'Nicht schlecht!';
  else msg = 'Da geht noch mehr!';
  document.getElementById('final-msg').textContent = msg;
}

// Keyboard: 1-4 or A-D
document.addEventListener('keydown', e => {
  if (answered) return;
  if (e.key >= '1' && e.key <= '4') selectAnswer(parseInt(e.key) - 1);
  if (e.key.toLowerCase() === 'a') selectAnswer(0);
  if (e.key.toLowerCase() === 'b') selectAnswer(1);
  if (e.key.toLowerCase() === 'c') selectAnswer(2);
  if (e.key.toLowerCase() === 'd') selectAnswer(3);
});

startQuiz();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Quiz</h2><p>Beantworte Fragen aus verschiedenen Kategorien. Wähle die richtige Antwort aus den Möglichkeiten.<br><br><b>Punkte:</b> Je schneller du antwortest, desto mehr Punkte bekommst du!</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
