<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tangram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:10px;user-select:none;padding:60px 10px 10px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
.btn{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:6px;padding:6px 16px;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn:hover{background:#0f3460}
canvas{border-radius:8px;cursor:grab;background:#16213e;border:1px solid #0f3460}
canvas:active{cursor:grabbing}
#msg{color:#c9b458;font-weight:bold;font-size:1rem;min-height:1.4em;text-align:center}
.controls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:center}
.controls label{color:#888;font-size:.85rem}
.controls select{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:4px;padding:2px 6px}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>TANGRAM</h1>
<div class="controls">
<label>Vorlage: <select id="sel-template" onchange="loadTemplate()">
<option value="0">Quadrat</option>
<option value="1">Haus</option>
<option value="2">Pfeil</option>
<option value="3">Boot</option>
<option value="4">Katze</option>
<option value="5">Herz</option>
<option value="6">Raute</option>
<option value="7">Dreieck</option>
<option value="8">Rechteck</option>
<option value="9">Parallelogramm</option>
</select></label>
<button class="btn" onclick="resetPieces()">Zurücksetzen</button>
</div>
<p id="msg">Ziehe Teile. Rechtsklick/Doppelklick = drehen.</p>
<canvas id="c" width="600" height="500"></canvas>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const S=40;// unit size

// 7 tangram pieces (total area = 16 square units, matching a 4x4 square)
const PIECE_DEFS=[
  {name:'Großes Dreieck 1',color:'#e74c3c',points:[[0,0],[4,0],[2,2]]},         // area 4
  {name:'Großes Dreieck 2',color:'#3498db',points:[[0,0],[4,0],[2,2]]},          // area 4
  {name:'Mittleres Dreieck',color:'#2ecc71',points:[[0,0],[2,0],[0,2]]},         // area 2
  {name:'Kleines Dreieck 1',color:'#f1c40f',points:[[0,0],[2,0],[1,1]]},         // area 1
  {name:'Kleines Dreieck 2',color:'#9b59b6',points:[[0,0],[2,0],[1,1]]},         // area 1
  {name:'Quadrat',color:'#e67e22',points:[[1,0],[2,1],[1,2],[0,1]]},             // area 2 (tilted 45°)
  {name:'Parallelogramm',color:'#1abc9c',points:[[0,0],[2,0],[3,1],[1,1]]},      // area 2
];

const TEMPLATES=[
  // All templates auto-scaled to match piece area (16 units²)
  {name:'Quadrat',poly:[[0,0],[4,0],[4,4],[0,4]]},
  {name:'Dreieck',poly:[[0,4],[4,0],[8,4]]},
  {name:'Rechteck',poly:[[0,0],[8,0],[8,2],[0,2]]},
  {name:'Parallelogramm',poly:[[2,0],[6,0],[4,4],[0,4]]},
  {name:'Raute',poly:[[2,0],[4,4],[2,8],[0,4]]},
  {name:'Haus',poly:[[0,4],[0,1],[3,0],[6,1],[6,4]]},
  {name:'Pfeil',poly:[[3,0],[6,3],[4,3],[4,6],[2,6],[2,3],[0,3]]},
  {name:'Boot',poly:[[0,3],[2,0],[6,0],[8,3]]},
  {name:'Katze',poly:[[0,5],[0,1],[1,0],[2.5,1.5],[4,0],[5,1],[5,4],[4,5]]},
  {name:'Herz',poly:[[2.5,5],[0,2.5],[0,1.5],[1.2,0],[2.5,1.2],[3.8,0],[5,1.5],[5,2.5]]},
];

let pieces=[],dragging=null,dragOff={x:0,y:0},currentTemplate=0;

function initPieces(){
  pieces=PIECE_DEFS.map((def,i)=>({
    points:def.points.map(([x,y])=>[x*S,y*S]),
    color:def.color,
    x:20+i*75,
    y:350,
    rotation:0,
    name:def.name
  }));
}

function resetPieces(){initPieces();draw();}

function loadTemplate(){
  currentTemplate=parseInt(document.getElementById('sel-template').value);
  draw();
}

function rotatePoint(px,py,cx,cy,angle){
  const cos=Math.cos(angle),sin=Math.sin(angle);
  return[cx+(px-cx)*cos-(py-cy)*sin,cy+(px-cx)*sin+(py-cy)*cos];
}

function getTransformedPoints(piece){
  const cx=piece.points.reduce((a,p)=>a+p[0],0)/piece.points.length;
  const cy=piece.points.reduce((a,p)=>a+p[1],0)/piece.points.length;
  return piece.points.map(([px,py])=>{
    const[rx,ry]=rotatePoint(px,py,cx,cy,piece.rotation);
    return[rx+piece.x,ry+piece.y];
  });
}

function drawPoly(points,fill,stroke,lw){
  ctx.beginPath();
  ctx.moveTo(points[0][0],points[0][1]);
  for(let i=1;i<points.length;i++)ctx.lineTo(points[i][0],points[i][1]);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||2;ctx.stroke();}
}

function draw(){
  ctx.fillStyle='#16213e';ctx.fillRect(0,0,canvas.width,canvas.height);

  // template silhouette (auto-scaled so area matches total piece area of 16)
  const tmpl=TEMPLATES[currentTemplate];
  const rawArea=(()=>{let a=0;const p=tmpl.poly;for(let i=0,j=p.length-1;i<p.length;j=i++)a+=p[j][0]*p[i][1]-p[i][0]*p[j][1];return Math.abs(a)/2;})();
  const tScale=S*Math.sqrt(16/rawArea);
  const tOff={x:canvas.width/2-tmpl.poly.reduce((a,p)=>a+p[0],0)/tmpl.poly.length*tScale,
              y:180-tmpl.poly.reduce((a,p)=>a+p[1],0)/tmpl.poly.length*tScale};
  const tPoints=tmpl.poly.map(([x,y])=>[x*tScale+tOff.x,y*tScale+tOff.y]);
  drawPoly(tPoints,'rgba(201,180,88,0.1)','rgba(201,180,88,0.3)',2);

  // pieces
  for(const piece of pieces){
    const pts=getTransformedPoints(piece);
    drawPoly(pts,piece.color+'cc',piece===dragging?'#c9b458':'#0f3460',piece===dragging?3:1.5);
  }
}

function pointInPoly(px,py,points){
  let inside=false;
  for(let i=0,j=points.length-1;i<points.length;j=i++){
    const[xi,yi]=points[i],[xj,yj]=points[j];
    if((yi>py)!==(yj>py)&&px<(xj-xi)*(py-yi)/(yj-yi)+xi)inside=!inside;
  }
  return inside;
}

canvas.onmousedown=function(e){
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  for(let i=pieces.length-1;i>=0;i--){
    const pts=getTransformedPoints(pieces[i]);
    if(pointInPoly(mx,my,pts)){
      dragging=pieces[i];
      dragOff={x:mx-pieces[i].x,y:my-pieces[i].y};
      pieces.push(pieces.splice(i,1)[0]);// bring to front
      draw();
      return;
    }
  }
};

canvas.onmousemove=function(e){
  if(!dragging)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  dragging.x=mx-dragOff.x;
  dragging.y=my-dragOff.y;
  draw();
};

canvas.onmouseup=()=>{dragging=null;draw();};

canvas.ondblclick=function(e){
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  for(let i=pieces.length-1;i>=0;i--){
    const pts=getTransformedPoints(pieces[i]);
    if(pointInPoly(mx,my,pts)){
      pieces[i].rotation+=Math.PI/4;
      draw();return;
    }
  }
};

canvas.oncontextmenu=function(e){
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  for(let i=pieces.length-1;i>=0;i--){
    const pts=getTransformedPoints(pieces[i]);
    if(pointInPoly(mx,my,pts)){
      pieces[i].rotation+=Math.PI/4;
      draw();return;
    }
  }
};

// Touch
let touchId=null;
canvas.ontouchstart=function(e){
  e.preventDefault();
  const t=e.touches[0];
  canvas.onmousedown({clientX:t.clientX,clientY:t.clientY});
};
canvas.ontouchmove=function(e){
  e.preventDefault();
  const t=e.touches[0];
  canvas.onmousemove({clientX:t.clientX,clientY:t.clientY});
};
canvas.ontouchend=function(e){e.preventDefault();canvas.onmouseup();};

initPieces();loadTemplate();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Tangram</h2><p>Lege alle 7 Teile so zusammen, dass sie die vorgegebene Figur exakt ausfüllen.<br><br><b>Steuerung:</b> Teile ziehen zum Verschieben, klicken zum Drehen.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
