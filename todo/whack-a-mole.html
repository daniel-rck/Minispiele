<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-a-Mole</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; flex-direction: column; gap: 14px; user-select: none; }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  .controls button { background: #16213e; color: #c9b458; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 16px; font-size: 0.9rem; cursor: pointer; }
  .controls button:hover { background: #0f3460; }
  #stats { display: flex; gap: 24px; font-size: 1rem; padding: 8px 24px; background: #16213e; border: 1px solid #0f3460; border-radius: 8px; }
  .val { color: #c9b458; font-weight: bold; }
  #board { display: grid; grid-template-columns: repeat(3, 110px); gap: 12px; }
  .hole { width: 110px; height: 110px; background: #0f1a30; border: 3px solid #0f3460; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.15s; }
  .hole:hover { border-color: #c9b458; }
  .mole { font-size: 3rem; position: absolute; transition: all 0.15s; transform: translateY(100%); opacity: 0; }
  .mole.up { transform: translateY(0); opacity: 1; }
  .mole.hit { transform: translateY(0) scale(0.8); opacity: 0.5; }
  .hole.whacked { border-color: #e74c3c; background: #2a1a1a; }
  .hole.scored { border-color: #2ecc71; }
  #msg { color: #c9b458; font-weight: bold; font-size: 1.2rem; min-height: 1.5em; }
  a.back-link { position: fixed; top: 16px; left: 16px; color: #c9b458; text-decoration: none; font-size: 1.1rem; padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px; background: #16213e; transition: background 0.2s; z-index: 100; }
  a.back-link:hover { background: #0f3460; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>WHACK-A-MOLE</h1>
<div class="controls"><button onclick="startGame()">Neues Spiel</button></div>
<div id="stats">
  <span>Punkte: <span class="val" id="score">0</span></span>
  <span>Zeit: <span class="val" id="timer">30</span>s</span>
  <span>Rekord: <span class="val" id="high">0</span></span>
</div>
<p id="msg">Klicke auf "Neues Spiel"</p>
<div id="board"></div>

<script>
const HOLES = 9;
const GAME_DURATION = 30;
let score = 0;
let timeLeft = 0;
let gameRunning = false;
let timerInterval = null;
let moleTimeout = null;
let activeMoles = new Set();
let highScore = parseInt(localStorage.getItem('whack-high') || '0');

document.getElementById('high').textContent = highScore;

function createBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let i = 0; i < HOLES; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.id = 'hole' + i;
    hole.onclick = () => whack(i);

    const mole = document.createElement('div');
    mole.className = 'mole';
    mole.id = 'mole' + i;
    mole.textContent = '🐹';
    hole.appendChild(mole);

    board.appendChild(hole);
  }
}

function startGame() {
  score = 0;
  timeLeft = GAME_DURATION;
  gameRunning = true;
  activeMoles.clear();
  document.getElementById('score').textContent = 0;
  document.getElementById('timer').textContent = timeLeft;
  document.getElementById('msg').textContent = 'Erwische die Maulwürfe!';

  // Reset all holes
  for (let i = 0; i < HOLES; i++) {
    document.getElementById('mole' + i).className = 'mole';
    document.getElementById('hole' + i).className = 'hole';
  }

  clearInterval(timerInterval);
  clearTimeout(moleTimeout);

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timer').textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);

  spawnMole();
}

function endGame() {
  gameRunning = false;
  clearInterval(timerInterval);
  clearTimeout(moleTimeout);

  // Hide all moles
  activeMoles.forEach(i => {
    document.getElementById('mole' + i).className = 'mole';
  });
  activeMoles.clear();

  if (score > highScore) {
    highScore = score;
    localStorage.setItem('whack-high', highScore);
    document.getElementById('high').textContent = highScore;
  }

  document.getElementById('msg').textContent = `Zeit vorbei! ${score} Punkte`;
}

function spawnMole() {
  if (!gameRunning) return;

  const elapsed = GAME_DURATION - timeLeft;
  const maxActive = Math.min(1 + Math.floor(elapsed / 8), 4);

  if (activeMoles.size >= maxActive) {
    moleTimeout = setTimeout(spawnMole, 200);
    return;
  }

  // Pick random hole not already active
  let hole;
  let attempts = 0;
  do {
    hole = Math.floor(Math.random() * HOLES);
    attempts++;
  } while (activeMoles.has(hole) && attempts < 20);

  if (attempts >= 20) {
    moleTimeout = setTimeout(spawnMole, 200);
    return;
  }

  activeMoles.add(hole);
  const mole = document.getElementById('mole' + hole);
  mole.className = 'mole up';

  // Speed increases over time — showTime always >= spawnDelay
  const showTime = Math.max(600, 1200 - elapsed * 20);

  setTimeout(() => {
    if (activeMoles.has(hole)) {
      mole.className = 'mole';
      activeMoles.delete(hole);
    }
  }, showTime);

  // Spawn next mole
  const spawnDelay = Math.max(500, 900 - elapsed * 15);
  moleTimeout = setTimeout(spawnMole, spawnDelay);
}

function whack(holeIdx) {
  if (!gameRunning) return;

  const hole = document.getElementById('hole' + holeIdx);

  if (activeMoles.has(holeIdx)) {
    // Hit!
    score++;
    document.getElementById('score').textContent = score;
    activeMoles.delete(holeIdx);

    const mole = document.getElementById('mole' + holeIdx);
    mole.className = 'mole hit';
    hole.classList.add('scored');

    setTimeout(() => {
      mole.className = 'mole';
      hole.classList.remove('scored');
    }, 300);
  } else {
    // Miss
    hole.classList.add('whacked');
    setTimeout(() => hole.classList.remove('whacked'), 200);
  }
}

createBoard();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Whack-a-Mole</h2><p>Schlage die Maulwürfe, sobald sie aus ihren Löchern schauen!<br><br><b>Steuerung:</b> Klicke/tippe so schnell wie möglich auf die Maulwürfe. Je schneller du bist, desto mehr Punkte!</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
