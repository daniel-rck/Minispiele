<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frogger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:10px;user-select:none;padding:60px 10px 10px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
canvas{border-radius:8px}
#info{font-size:.9rem;color:#888}.val{color:#c9b458;font-weight:bold}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>FROGGER</h1>
<canvas id="c" width="520" height="560"></canvas>
<p id="info">Highscore: <span class="val" id="best">0</span> | Leben: <span class="val" id="lives">3</span></p>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const ROWS=13,CS=H/ROWS,COLS=Math.floor(W/CS);
let frog,lives,score,level,goals,lanes,gameOver;

const LANE_TYPES=[
  'goal','water','water','water','water','water','safe',
  'road','road','road','road','road','start'
];

function makeLanes(){
  lanes=[];
  for(let r=0;r<ROWS;r++){
    const type=LANE_TYPES[r];
    const objs=[];
    if(type==='road'){
      const dir=r%2===0?1:-1;
      const speed=(0.6+Math.random()*0.8+level*0.15)*dir;
      const gap=150+Math.random()*80;
      const w=35+Math.random()*30;
      for(let x=-w;x<W+200;x+=gap){
        objs.push({x,y:r*CS,w,h:CS-4,speed,color:['#e74c3c','#e67e22','#3498db','#8e44ad'][Math.floor(Math.random()*4)]});
      }
    } else if(type==='water'){
      const dir=r%2===0?1:-1;
      const speed=(0.4+Math.random()*0.5+level*0.1)*dir;
      const w=90+Math.random()*60;
      const gap=w+30+Math.random()*30;
      for(let x=-w;x<W+200;x+=gap){
        objs.push({x,y:r*CS,w,h:CS-2,speed,color:'#6d4c1d'});// logs
      }
    }
    lanes.push({type,objs});
  }
}

function reset(){
  lives=3;score=0;level=1;gameOver=false;
  goals=[false,false,false,false,false];
  makeLanes();
  spawnFrog();
  document.getElementById('lives').textContent=lives;
}

function spawnFrog(){
  frog={x:W/2-CS/2,y:(ROWS-1)*CS,w:CS-8,h:CS-8,onLog:null};
}

function update(){
  if(gameOver)return;
  // update objects
  for(const lane of lanes){
    for(const o of lane.objs){
      o.x+=o.speed;
      if(o.speed>0&&o.x>W+100)o.x=-o.w-50;
      if(o.speed<0&&o.x<-o.w-100)o.x=W+50;
    }
  }

  // frog on log
  const frogRow=Math.round(frog.y/CS);
  if(frogRow>=0&&frogRow<ROWS&&LANE_TYPES[frogRow]==='water'){
    let onLog=false;
    for(const o of lanes[frogRow].objs){
      if(frog.x+frog.w>o.x-2&&frog.x<o.x+o.w+2&&Math.abs(frog.y-o.y)<CS){
        frog.x+=o.speed;
        onLog=true;break;
      }
    }
    if(!onLog){die();return;}
  }

  // road collision
  if(frogRow>=0&&frogRow<ROWS&&LANE_TYPES[frogRow]==='road'){
    for(const o of lanes[frogRow].objs){
      if(frog.x+frog.w>o.x+4&&frog.x<o.x+o.w-4&&Math.abs(frog.y-o.y)<CS-4){
        die();return;
      }
    }
  }

  // goal row
  if(frogRow===0){
    const slot=Math.floor((frog.x+frog.w/2)/(W/5));
    if(slot>=0&&slot<5&&!goals[slot]){
      goals[slot]=true;score+=100;
      if(goals.every(Boolean)){level++;score+=500;goals=[false,false,false,false,false];makeLanes();}
      spawnFrog();
    } else {die();}
  }

  // bounds
  if(frog.x<-10||frog.x>W+10)die();
}

function die(){
  lives--;
  document.getElementById('lives').textContent=lives;
  if(lives<=0){
    gameOver=true;
    const best=parseInt(localStorage.getItem('frogger-best')||'0');
    if(score>best)localStorage.setItem('frogger-best',score);
    document.getElementById('best').textContent=localStorage.getItem('frogger-best');
  } else spawnFrog();
}

function draw(){
  // background
  for(let r=0;r<ROWS;r++){
    const type=LANE_TYPES[r];
    ctx.fillStyle=type==='water'?'#1a3a5c':type==='road'?'#2c2c2c':type==='goal'?'#1a3a5c':'#16213e';
    ctx.fillRect(0,r*CS,W,CS);
    if(type==='road'){
      ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.setLineDash([10,10]);
      ctx.beginPath();ctx.moveTo(0,r*CS+CS/2);ctx.lineTo(W,r*CS+CS/2);ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // goal slots
  for(let i=0;i<5;i++){
    const x=i*(W/5)+W/10-15;
    ctx.fillStyle=goals[i]?'#2ecc71':'#0f3460';
    ctx.beginPath();ctx.arc(x+15,CS/2,14,0,Math.PI*2);ctx.fill();
  }

  // objects
  for(const lane of lanes){
    for(const o of lane.objs){
      ctx.fillStyle=o.color;
      ctx.beginPath();ctx.roundRect(o.x,o.y+2,o.w,o.h,4);ctx.fill();
    }
  }

  // frog
  if(!gameOver){
    ctx.fillStyle='#2ecc71';
    ctx.beginPath();ctx.roundRect(frog.x+4,frog.y+4,frog.w,frog.h,8);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(frog.x+12,frog.y+12,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(frog.x+frog.w-8,frog.y+12,3,0,Math.PI*2);ctx.fill();
  }

  // HUD
  ctx.fillStyle='#c9b458';ctx.font='bold 16px Segoe UI';ctx.textAlign='left';
  ctx.fillText(`Punkte: ${score}  Level: ${level}`,10,H-8);

  if(gameOver){
    ctx.fillStyle='rgba(26,26,46,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#c9b458';ctx.font='bold 28px Segoe UI';ctx.textAlign='center';
    ctx.fillText('Game Over!',W/2,H/2-15);
    ctx.font='16px Segoe UI';ctx.fillText(`Punkte: ${score}`,W/2,H/2+15);
    ctx.fillStyle='#888';ctx.font='14px Segoe UI';
    ctx.fillText('Leertaste zum Neustart',W/2,H/2+40);
  }
}

function move(dr,dc){
  if(gameOver)return;
  frog.x+=dc*CS;frog.y+=dr*CS;
  frog.x=Math.max(0,Math.min(W-frog.w-8,frog.x));
  frog.y=Math.max(0,Math.min((ROWS-1)*CS,frog.y));
  if(dr<0)score+=10;
}

document.onkeydown=e=>{
  if(e.key==='ArrowUp')move(-1,0);
  else if(e.key==='ArrowDown')move(1,0);
  else if(e.key==='ArrowLeft')move(0,-1);
  else if(e.key==='ArrowRight')move(0,1);
  else if(e.code==='Space'&&gameOver)reset();
};

let touchStart=null;
canvas.ontouchstart=e=>{e.preventDefault();touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};if(gameOver)reset();};
canvas.ontouchend=e=>{
  e.preventDefault();
  if(!touchStart)return;
  const dx=e.changedTouches[0].clientX-touchStart.x;
  const dy=e.changedTouches[0].clientY-touchStart.y;
  if(Math.abs(dx)>Math.abs(dy)){move(0,dx>0?1:-1);}
  else{move(dy>0?1:-1,0);}
  touchStart=null;
};

function loop(){update();draw();requestAnimationFrame(loop);}
const best=localStorage.getItem('frogger-best');
if(best)document.getElementById('best').textContent=best;
reset();loop();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Frogger</h2><p>Führe den Frosch sicher über die Straße und den Fluss nach oben ins Ziel.<br><br><b>Steuerung:</b> Pfeiltasten oder Wischen. Autos und Wasser vermeiden, auf Baumstämme springen!</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
