<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; flex-direction: column; gap: 14px; user-select: none; }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  #status { font-size: 1rem; padding: 8px 24px; border-radius: 8px; background: #16213e; border: 1px solid #0f3460; display: flex; align-items: center; gap: 20px; }
  .val { color: #c9b458; font-weight: bold; }
  canvas { border: 3px solid #c9b458; border-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: block; }
  .wrap { position: relative; }
  #overlay { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.75); border-radius: 4px; }
  #overlay.hidden { display: none; }
  #overlay span { color: #c9b458; font-size: 1.4rem; letter-spacing: 2px; font-weight: bold; }
  #overlay .sub { font-size: 0.9rem; color: #888; letter-spacing: 0; font-weight: normal; }
  #overlay .medal { font-size: 2.5rem; }
  a.back-link { position: fixed; top: 16px; left: 16px; color: #c9b458; text-decoration: none; font-size: 1.1rem; padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px; background: #16213e; transition: background 0.2s; z-index: 100; }
  a.back-link:hover { background: #0f3460; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>FLAPPY BIRD</h1>
<div id="status">
  <span>Punkte: <span class="val" id="score">0</span></span>
  <span>Rekord: <span class="val" id="high">0</span></span>
</div>
<div class="wrap">
  <canvas id="canvas" width="400" height="550"></canvas>
  <div id="overlay">
    <span>FLAPPY BIRD</span>
    <span class="sub">Leertaste, Klick oder Tap zum Flattern</span>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let highScore = parseInt(localStorage.getItem('flappy-high') || '0');
document.getElementById('high').textContent = highScore;

const GRAVITY = 0.35;
const FLAP_FORCE = -6.5;
const PIPE_W = 52;
const PIPE_GAP_START = 150;
const PIPE_GAP_MIN = 100;
const PIPE_SPEED = 2.5;
const BIRD_R = 14;
const GROUND_H = 60;

let bird, pipes, score, state, flashTimer, groundX;
let stars = [];

// Generate stars
for (let i = 0; i < 60; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * (H - GROUND_H - 100), r: 0.5 + Math.random() * 1.5, blink: Math.random() * Math.PI * 2 });
}
// Mountains
let mountains = [];
for (let i = 0; i < 8; i++) {
  mountains.push({ x: i * 80 - 40, h: 30 + Math.random() * 50, w: 60 + Math.random() * 40 });
}

function showOverlay(show, title, sub, medal) {
  const el = document.getElementById('overlay');
  if (show) {
    el.classList.remove('hidden');
    let html = `<span>${title}</span>`;
    if (medal) html += `<span class="medal">${medal}</span>`;
    if (sub) html += `<span class="sub">${sub}</span>`;
    el.innerHTML = html;
  } else { el.classList.add('hidden'); }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('flappy-high', highScore);
    document.getElementById('high').textContent = highScore;
  }
}

function getGap() {
  return Math.max(PIPE_GAP_MIN, PIPE_GAP_START - score * 2);
}

function spawnPipe() {
  const gap = getGap();
  const minTop = 60;
  const maxTop = H - GROUND_H - gap - 60;
  const topH = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W + 10, topH, gap, scored: false });
}

function initGame() {
  bird = { x: 80, y: H / 2 - 50, vy: 0, rotation: 0 };
  pipes = [];
  score = 0;
  state = 'ready';
  flashTimer = 0;
  groundX = 0;
  updateUI();
  showOverlay(true, 'FLAPPY BIRD', 'Leertaste, Klick oder Tap zum Flattern');
}

function flap() {
  if (state === 'dead') { initGame(); return; }
  if (state === 'ready') {
    state = 'playing';
    showOverlay(false);
    spawnPipe();
  }
  if (state === 'playing') {
    bird.vy = FLAP_FORCE;
  }
}

function tick() {
  if (state !== 'playing') {
    if (state === 'ready') {
      bird.y = H / 2 - 50 + Math.sin(Date.now() / 300) * 8;
    }
    groundX -= 1;
    if (groundX < -40) groundX += 40;
    return;
  }

  // Bird physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, bird.vy * 0.08));

  // Ground scroll
  groundX -= PIPE_SPEED;
  if (groundX < -40) groundX += 40;

  // Pipes
  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= PIPE_SPEED;
    if (pipes[i].x < -PIPE_W - 10) pipes.splice(i, 1);
  }

  // Spawn new pipe
  const lastPipe = pipes[pipes.length - 1];
  if (!lastPipe || lastPipe.x < W - 200) spawnPipe();

  // Score
  for (const p of pipes) {
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
      updateUI();
    }
  }

  // Collision
  const bx = bird.x, by = bird.y;

  // Ground/ceiling
  if (by + BIRD_R > H - GROUND_H || by - BIRD_R < 0) {
    die();
    return;
  }

  // Pipes
  for (const p of pipes) {
    if (bx + BIRD_R > p.x && bx - BIRD_R < p.x + PIPE_W) {
      if (by - BIRD_R < p.topH || by + BIRD_R > p.topH + p.gap) {
        die();
        return;
      }
    }
  }
}

function die() {
  state = 'dead';
  flashTimer = 8;
  let medal = '';
  if (score >= 50) medal = '🥇';
  else if (score >= 25) medal = '🥈';
  else if (score >= 10) medal = '🥉';
  showOverlay(true, 'GAME OVER', `${score} Punkte — Tap für neues Spiel`, medal);
}

function draw() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
  grad.addColorStop(0, '#0a0a1e');
  grad.addColorStop(1, '#1a1a3e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - GROUND_H);

  // Stars
  const time = Date.now() / 1000;
  for (const s of stars) {
    const alpha = 0.3 + 0.4 * Math.sin(time + s.blink);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Mountains (parallax)
  ctx.fillStyle = '#12122e';
  const mOffset = state === 'playing' ? (Date.now() * 0.02) % 80 : 0;
  for (const m of mountains) {
    const mx = ((m.x - mOffset) % (W + 100) + W + 100) % (W + 100) - 50;
    ctx.beginPath();
    ctx.moveTo(mx, H - GROUND_H);
    ctx.lineTo(mx + m.w / 2, H - GROUND_H - m.h);
    ctx.lineTo(mx + m.w, H - GROUND_H);
    ctx.fill();
  }

  // Pipes
  for (const p of pipes) {
    // Top pipe
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(p.x, 0, PIPE_W, p.topH);
    ctx.fillStyle = '#16213e';
    ctx.fillRect(p.x + 3, 0, PIPE_W - 6, p.topH - 2);
    // Top pipe cap
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(p.x - 4, p.topH - 16, PIPE_W + 8, 16);
    ctx.fillStyle = '#16213e';
    ctx.fillRect(p.x - 2, p.topH - 14, PIPE_W + 4, 12);

    // Bottom pipe
    const botY = p.topH + p.gap;
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(p.x, botY, PIPE_W, H - botY);
    ctx.fillStyle = '#16213e';
    ctx.fillRect(p.x + 3, botY + 2, PIPE_W - 6, H - botY);
    // Bottom pipe cap
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(p.x - 4, botY, PIPE_W + 8, 16);
    ctx.fillStyle = '#16213e';
    ctx.fillRect(p.x - 2, botY + 2, PIPE_W + 4, 12);
  }

  // Ground
  ctx.fillStyle = '#0f3460';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  ctx.fillStyle = '#16213e';
  for (let x = groundX; x < W + 40; x += 40) {
    ctx.fillRect(x, H - GROUND_H, 20, 4);
  }
  ctx.fillStyle = '#c9b45830';
  ctx.fillRect(0, H - GROUND_H, W, 2);

  // Bird
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rotation);

  // Body
  ctx.fillStyle = '#c9b458';
  ctx.beginPath();
  ctx.ellipse(0, 0, BIRD_R, BIRD_R - 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  const wingY = Math.sin(Date.now() / 80) * 3;
  ctx.fillStyle = '#a89040';
  ctx.beginPath();
  ctx.ellipse(-3, wingY, 8, 4, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(6, -4, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(7, -4, 2, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#e67e22';
  ctx.beginPath();
  ctx.moveTo(BIRD_R - 2, -2);
  ctx.lineTo(BIRD_R + 6, 1);
  ctx.lineTo(BIRD_R - 2, 4);
  ctx.fill();

  ctx.restore();

  // Score on screen
  if (state === 'playing') {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 6;
    ctx.fillText(score, W / 2, 60);
    ctx.shadowBlur = 0;
  }

  // Flash on death
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,0,0,${flashTimer / 16})`;
    ctx.fillRect(0, 0, W, H);
    flashTimer--;
  }
}

function gameLoop() {
  tick();
  draw();
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flap(); }
});
canvas.addEventListener('click', e => { e.preventDefault(); flap(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });

initGame();
gameLoop();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Flappy Bird</h2><p>Steuere den Vogel durch die Lücken zwischen den Rohren. Jedes passierte Rohrpaar gibt einen Punkt.<br><br><b>Steuerung:</b> Klick, Leertaste oder Touch zum Flattern.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
