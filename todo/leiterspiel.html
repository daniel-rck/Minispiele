<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leiterspiel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:10px;user-select:none;padding:60px 10px 10px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
.btn{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:6px;padding:6px 16px;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn:hover{background:#0f3460}
.btn:disabled{opacity:.4;cursor:default}
canvas{border-radius:8px;cursor:pointer}
#msg{color:#c9b458;font-weight:bold;font-size:1rem;min-height:1.4em;text-align:center}
.controls{display:flex;gap:8px;align-items:center}
.die-display{width:50px;height:50px;background:#f5f5f0;border-radius:8px;display:flex;justify-content:center;align-items:center;font-size:1.5rem;font-weight:bold;color:#1a1a2e}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>LEITERSPIEL</h1>
<p id="msg">Klicke "Würfeln" um zu starten!</p>
<canvas id="c" width="500" height="500"></canvas>
<div class="controls">
<div class="die-display" id="die">-</div>
<button class="btn" id="btn-roll" onclick="rollDice()">Würfeln</button>
<button class="btn" onclick="newGame()">Neues Spiel</button>
</div>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,CS=W/10;
const COLORS=['#3498db','#e74c3c','#2ecc71','#f1c40f'];
const NAMES=['Du','KI 1','KI 2','KI 3'];
// Ladders (from -> to) go UP
const LADDERS={2:38,7:14,8:31,15:26,21:42,28:84,36:44,51:67,71:91,78:98,87:94};
// Snakes (from -> to) go DOWN
const SNAKES={16:6,46:25,49:11,62:19,64:60,74:53,89:68,92:88,95:75,99:80};

let players,currentPlayer,gameOver,rolling;

function posToXY(pos){
  if(pos<=0)return{x:-30,y:W+10};
  const p=pos-1;
  const row=Math.floor(p/10);
  let col=p%10;
  if(row%2===1)col=9-col;
  return{x:col*CS+CS/2,y:(9-row)*CS+CS/2};
}

function newGame(){
  players=[0,0,0,0];currentPlayer=0;gameOver=false;rolling=false;
  document.getElementById('msg').textContent='Dein Zug — klicke "Würfeln"!';
  document.getElementById('btn-roll').disabled=false;
  draw();
}

function draw(){
  ctx.fillStyle='#16213e';ctx.fillRect(0,0,W,W);
  // Grid
  for(let r=0;r<10;r++){
    for(let c=0;c<10;c++){
      const num=r*10+(r%2===0?c:9-c)+1;
      const x=c*CS,y=(9-r)*CS;
      ctx.fillStyle=(r+c)%2===0?'#1a2a4e':'#16213e';
      ctx.fillRect(x,y,CS,CS);
      ctx.fillStyle='#555';ctx.font='11px Segoe UI';ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(num,x+CS/2,y+3);
    }
  }
  // Ladders
  for(const[from,to]of Object.entries(LADDERS)){
    const a=posToXY(parseInt(from)),b=posToXY(parseInt(to));
    ctx.strokeStyle='#2ecc71';ctx.lineWidth=4;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#2ecc71';ctx.font='bold 14px Segoe UI';ctx.fillText('↑',a.x+12,a.y-6);
  }
  // Snakes
  for(const[from,to]of Object.entries(SNAKES)){
    const a=posToXY(parseInt(from)),b=posToXY(parseInt(to));
    ctx.strokeStyle='#e74c3c';ctx.lineWidth=4;ctx.setLineDash([6,4]);
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#e74c3c';ctx.font='bold 14px Segoe UI';ctx.fillText('↓',a.x+12,a.y-6);
  }
  // Players
  const offsets=[[-8,-8],[8,-8],[-8,8],[8,8]];
  for(let p=0;p<4;p++){
    const pos=posToXY(players[p]);
    const ox=offsets[p][0],oy=offsets[p][1];
    ctx.fillStyle=COLORS[p];
    ctx.beginPath();ctx.arc(pos.x+ox,pos.y+oy,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 8px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p===0?'Du':p,pos.x+ox,pos.y+oy);
    if(p===currentPlayer&&!gameOver){
      ctx.strokeStyle='#c9b458';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(pos.x+ox,pos.y+oy,10,0,Math.PI*2);ctx.stroke();
    }
  }
}

function rollDice(){
  if(gameOver||rolling)return;
  if(currentPlayer!==0){return;}
  rolling=true;
  document.getElementById('btn-roll').disabled=true;
  let count=0;
  const anim=setInterval(()=>{
    document.getElementById('die').textContent=1+Math.floor(Math.random()*6);
    count++;
    if(count>10){
      clearInterval(anim);
      const roll=1+Math.floor(Math.random()*6);
      document.getElementById('die').textContent=roll;
      movePlayer(0,roll);
    }
  },80);
}

function movePlayer(pIdx,roll){
  const oldPos=players[pIdx];
  let newPos=oldPos+roll;
  if(newPos>100)newPos=oldPos;// can't go past 100
  players[pIdx]=newPos;
  draw();

  setTimeout(()=>{
    // Check ladders/snakes
    if(LADDERS[newPos]){
      players[pIdx]=LADDERS[newPos];
      document.getElementById('msg').textContent=`${NAMES[pIdx]}: Leiter! ${newPos} → ${LADDERS[newPos]}`;
    } else if(SNAKES[newPos]){
      players[pIdx]=SNAKES[newPos];
      document.getElementById('msg').textContent=`${NAMES[pIdx]}: Schlange! ${newPos} → ${SNAKES[newPos]}`;
    }
    draw();

    if(players[pIdx]===100){
      gameOver=true;
      document.getElementById('msg').textContent=`${NAMES[pIdx]} hat gewonnen!`;
      rolling=false;
      return;
    }

    // Next player
    currentPlayer=(currentPlayer+1)%4;
    rolling=false;
    if(currentPlayer!==0){
      document.getElementById('msg').textContent=`${NAMES[currentPlayer]} würfelt...`;
      setTimeout(()=>aiRoll(currentPlayer),600);
    } else {
      document.getElementById('msg').textContent='Dein Zug — würfle!';
      document.getElementById('btn-roll').disabled=false;
    }
  },300);
}

function aiRoll(pIdx){
  if(gameOver)return;
  const roll=1+Math.floor(Math.random()*6);
  document.getElementById('die').textContent=roll;
  document.getElementById('msg').textContent=`${NAMES[pIdx]} würfelt ${roll}`;
  movePlayer(pIdx,roll);
}

newGame();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Leiterspiel</h2><p>Würfle und rücke vorwärts. Landest du am Fuß einer <b>Leiter</b>, kletterst du hoch. Landest du auf dem Kopf einer <b>Schlange</b>, rutschst du herunter.<br><br><b>Ziel:</b> Erreiche als Erster Feld 100!</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
