<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; flex-direction: column; gap: 16px; user-select: none; }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  #status { font-size: 1.1rem; padding: 8px 24px; border-radius: 8px; background: #16213e; border: 1px solid #0f3460; display: flex; align-items: center; gap: 20px; }
  #status.won { background: #1a5c1a; border-color: #3a3; font-weight: bold; }
  #timer { color: #c9b458; font-variant-numeric: tabular-nums; }
  #board { display: grid; gap: 8px; perspective: 800px; }
  .card { width: 80px; height: 80px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched { transform: rotateY(180deg); }
  .card.matched .card-front { box-shadow: 0 0 12px rgba(201,180,88,0.5); }
  .card-face { position: absolute; inset: 0; border-radius: 8px; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; }
  .card-back { background: linear-gradient(135deg, #16213e 25%, #0f3460 25%, #0f3460 50%, #16213e 50%, #16213e 75%, #0f3460 75%); background-size: 10px 10px; border: 2px solid #c9b458; }
  .card-front { background: #f5f0e1; transform: rotateY(180deg); font-size: 36px; border: 2px solid #c9b458; }
  #controls { display: flex; gap: 12px; }
  button { padding: 8px 20px; border: 1px solid #c9b458; background: #16213e; color: #c9b458; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: background 0.2s; }
  button:hover { background: #0f3460; }
  select { padding: 8px 12px; border: 1px solid #c9b458; background: #16213e; color: #c9b458; border-radius: 6px; cursor: pointer; font-size: 0.95rem; outline: none; }
  a.back-link { position: fixed; top: 16px; left: 16px; color: #c9b458; text-decoration: none; font-size: 1.1rem; padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px; background: #16213e; transition: background 0.2s; z-index: 100; }
  a.back-link:hover { background: #0f3460; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">← Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>MEMORY</h1>
<div id="status">
  <span>Züge: <span id="moves">0</span></span>
  <span id="timer">00:00</span>
  <span>Paare: <span id="pairs">0</span>/<span id="total-pairs">8</span></span>
</div>
<div id="board"></div>
<div id="controls">
  <button onclick="newGame()">Neues Spiel</button>
  <select id="size" onchange="newGame()">
    <option value="4">4x4 (8 Paare)</option>
    <option value="6">6x6 (18 Paare)</option>
  </select>
</div>

<script>
const ALL_EMOJI = ['🐶','🐱','🐼','🦊','🐸','🦁','🐧','🐝','🦋','🐢','🐬','🦄','🐙','🦀','🐳','🦅','🍎','🍕','🎸','🌟','🔥','💎','🎯','🏀','🎲','🚀','🌈','🍀','🎭','🧩','🌻','🎪','🦖','🐨','🦈','🎠'];
let cards, flipped, matched, moves, pairsFound, totalPairs, locked, seconds, timerInterval;

function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function newGame() {
  const size = parseInt(document.getElementById('size').value);
  totalPairs = (size * size) / 2;
  const emojis = shuffle([...ALL_EMOJI]).slice(0, totalPairs);
  cards = shuffle([...emojis, ...emojis]);
  flipped = []; matched = new Set(); moves = 0; pairsFound = 0; locked = false;
  seconds = 0;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => { seconds++; document.getElementById('timer').textContent = formatTime(seconds); }, 1000);
  document.getElementById('status').className = '';
  document.getElementById('total-pairs').textContent = totalPairs;
  render();
}

function formatTime(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

function flipCard(index) {
  if (locked || flipped.includes(index) || matched.has(index)) return;
  flipped.push(index);
  renderCard(index, true);

  if (flipped.length === 2) {
    moves++;
    locked = true;
    const [a, b] = flipped;
    if (cards[a] === cards[b]) {
      matched.add(a); matched.add(b); pairsFound++;
      flipped = []; locked = false;
      updateStatus();
      if (pairsFound === totalPairs) {
        clearInterval(timerInterval);
        document.getElementById('status').className = 'won';
      }
    } else {
      setTimeout(() => {
        renderCard(a, false); renderCard(b, false);
        flipped = []; locked = false;
        updateStatus();
      }, 800);
    }
    updateStatus();
  }
}

function updateStatus() {
  document.getElementById('moves').textContent = moves;
  document.getElementById('pairs').textContent = pairsFound;
}

function renderCard(index, show) {
  const el = document.querySelectorAll('.card')[index];
  if (show || matched.has(index)) el.classList.add('flipped');
  else el.classList.remove('flipped');
  if (matched.has(index)) el.classList.add('matched');
}

function render() {
  const size = parseInt(document.getElementById('size').value);
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${size}, 80px)`;
  board.innerHTML = '';
  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (matched.has(i) ? ' flipped matched' : '');
    card.innerHTML = `<div class="card-face card-back"></div><div class="card-face card-front">${emoji}</div>`;
    card.addEventListener('click', () => flipCard(i));
    board.appendChild(card);
  });
  updateStatus();
}

newGame();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Memory</h2><p>Decke immer 2 Karten auf. Sind sie gleich, bleiben sie offen. Merke dir die Positionen!<br><br><b>Ziel:</b> Finde alle Paare mit möglichst wenigen Versuchen und in möglichst kurzer Zeit.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
