<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; flex-direction: column; gap: 16px; user-select: none; padding: 20px; }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  .controls { display: flex; gap: 10px; }
  .controls button { background: #16213e; color: #c9b458; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 16px; font-size: 0.9rem; cursor: pointer; }
  .controls button:hover { background: #0f3460; }
  .controls select { background: #16213e; color: #c9b458; border: 1px solid #0f3460; border-radius: 6px; padding: 4px 10px; font-size: 0.9rem; }
  #stats { display: flex; gap: 24px; font-size: 1rem; padding: 10px 24px; background: #16213e; border: 1px solid #0f3460; border-radius: 8px; }
  .val { color: #c9b458; font-weight: bold; font-size: 1.2rem; }
  #text-display { max-width: 700px; width: 100%; padding: 20px; background: #16213e; border: 2px solid #0f3460; border-radius: 10px; font-size: 1.15rem; line-height: 1.8; min-height: 120px; letter-spacing: 0.5px; }
  #text-display .correct { color: #2ecc71; }
  #text-display .incorrect { color: #e74c3c; background: #5c1a1a; border-radius: 2px; }
  #text-display .current { border-bottom: 2px solid #c9b458; color: #c9b458; }
  #text-display .upcoming { color: #555; }
  #input-hint { max-width: 700px; width: 100%; text-align: center; color: #555; font-size: 0.9rem; }
  #result { text-align: center; padding: 16px; background: #16213e; border: 2px solid #c9b458; border-radius: 10px; display: none; max-width: 400px; }
  #result h2 { color: #c9b458; margin-bottom: 10px; }
  #result .stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #0f3460; }
  a.back-link { position: fixed; top: 16px; left: 16px; color: #c9b458; text-decoration: none; font-size: 1.1rem; padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px; background: #16213e; transition: background 0.2s; z-index: 100; }
  a.back-link:hover { background: #0f3460; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>TYPING TEST</h1>
<div class="controls">
  <select id="duration">
    <option value="30">30 Sekunden</option>
    <option value="60" selected>60 Sekunden</option>
    <option value="120">2 Minuten</option>
  </select>
  <button onclick="startTest()">Neuer Test</button>
</div>
<div id="stats">
  <span>WPM: <span class="val" id="wpm">0</span></span>
  <span>Genauigkeit: <span class="val" id="accuracy">100%</span></span>
  <span>Zeit: <span class="val" id="timer">60</span>s</span>
</div>
<div id="text-display"></div>
<p id="input-hint">Einfach lostippen...</p>
<div id="result"></div>

<script>
const WORDS_DE = [
  'der','die','und','in','den','von','zu','das','mit','sich','des','auf','für','ist','im','dem','nicht','ein','eine','als',
  'auch','es','an','werden','aus','er','hat','dass','sie','nach','wird','bei','einer','um','am','sind','noch','wie','einem',
  'über','so','zum','kann','wurde','haben','nur','oder','aber','vor','zur','bis','mehr','durch','man','seine','seit','her',
  'wenn','dann','unter','wir','diese','ihren','alle','zwischen','schon','durch','immer','wieder','neue','anderen','dieser',
  'Zeit','Leben','Arbeit','Jahr','Welt','Haus','Stadt','Frau','Mann','Kind','Geld','Hand','Teil','Platz','Stelle','Seite',
  'Bild','Wasser','Kopf','Auge','Wort','Weg','Ende','Stunde','Monat','Abend','Nacht','Morgen','Anfang','Frage','Antwort',
  'groß','klein','lang','kurz','gut','schlecht','neu','alt','jung','schnell','langsam','hoch','tief','breit','schmal',
  'gehen','kommen','stehen','sehen','geben','nehmen','finden','sagen','machen','wissen','denken','glauben','sprechen',
  'schreiben','lesen','lernen','arbeiten','spielen','helfen','bringen','laufen','fahren','tragen','halten','beginnen',
  'heute','gestern','morgen','hier','dort','oben','unten','links','rechts','innen','außen','vorne','hinten',
];

const VISIBLE_CHARS = 80;
let text = '';
let charIndex = 0;
let correctCount = 0;
let incorrectChars = [];
let totalTyped = 0;
let startTime = null;
let timerInterval = null;
let duration = 60;
let running = false;
let finished = false;
let renderPending = false;
let spans = [];

function generateText(wordCount) {
  const words = [];
  for (let i = 0; i < wordCount; i++) {
    words.push(WORDS_DE[Math.floor(Math.random() * WORDS_DE.length)]);
  }
  return words.join(' ');
}

function buildSpans() {
  const display = document.getElementById('text-display');
  display.innerHTML = '';
  spans = [];
  for (let i = 0; i < VISIBLE_CHARS; i++) {
    const span = document.createElement('span');
    spans.push(span);
    display.appendChild(span);
  }
}

function renderText() {
  const windowBefore = 15;
  const start = Math.max(0, charIndex - windowBefore);
  const end = Math.min(text.length, start + VISIBLE_CHARS);

  for (let s = 0; s < VISIBLE_CHARS; s++) {
    const i = start + s;
    const span = spans[s];
    if (i >= end) {
      span.className = '';
      span.textContent = '';
      continue;
    }
    span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
    if (i < charIndex) {
      span.className = incorrectChars.includes(i) ? 'incorrect' : 'correct';
    } else if (i === charIndex) {
      span.className = 'current';
    } else {
      span.className = 'upcoming';
    }
  }
}

function scheduleRender() {
  if (!renderPending) {
    renderPending = true;
    requestAnimationFrame(() => {
      renderPending = false;
      renderText();
    });
  }
}

function startTest() {
  duration = parseInt(document.getElementById('duration').value);
  text = generateText(100);
  charIndex = 0;
  correctCount = 0;
  incorrectChars = [];
  totalTyped = 0;
  startTime = null;
  running = false;
  finished = false;
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = duration;
  document.getElementById('wpm').textContent = '0';
  document.getElementById('accuracy').textContent = '100%';
  document.getElementById('result').style.display = 'none';
  document.getElementById('input-hint').textContent = 'Einfach lostippen...';
  buildSpans();
  renderText();
}

function endTest() {
  finished = true;
  running = false;
  clearInterval(timerInterval);

  const elapsed = duration;
  const words = correctCount / 5;
  const wpm = Math.round(words / (elapsed / 60));
  const accuracy = totalTyped > 0 ? Math.round((correctCount / totalTyped) * 100) : 100;

  document.getElementById('wpm').textContent = wpm;
  document.getElementById('accuracy').textContent = accuracy + '%';
  document.getElementById('input-hint').textContent = 'Test beendet. Klicke "Neuer Test" zum Neustarten.';

  const result = document.getElementById('result');
  result.style.display = 'block';
  result.innerHTML = `
    <h2>Ergebnis</h2>
    <div class="stat-row"><span>WPM</span><span class="val">${wpm}</span></div>
    <div class="stat-row"><span>Genauigkeit</span><span class="val">${accuracy}%</span></div>
    <div class="stat-row"><span>Zeichen korrekt</span><span class="val">${correctCount}</span></div>
    <div class="stat-row"><span>Zeichen gesamt</span><span class="val">${totalTyped}</span></div>
    <div class="stat-row"><span>Dauer</span><span class="val">${elapsed}s</span></div>
  `;
}

document.addEventListener('keydown', e => {
  if (finished) return;
  // Ignore modifier keys, function keys, navigation
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  if (e.key.length !== 1) return;

  e.preventDefault();

  if (!running) {
    running = true;
    startTime = Date.now();
    document.getElementById('input-hint').textContent = '';
    timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const remaining = Math.max(0, duration - elapsed);
      document.getElementById('timer').textContent = remaining;
      if (remaining <= 0) endTest();

      const words = correctCount / 5;
      const wpm = elapsed > 0 ? Math.round(words / (elapsed / 60)) : 0;
      document.getElementById('wpm').textContent = wpm;
      const accuracy = totalTyped > 0 ? Math.round((correctCount / totalTyped) * 100) : 100;
      document.getElementById('accuracy').textContent = accuracy + '%';
    }, 500);
  }

  if (charIndex < text.length) {
    totalTyped++;
    if (e.key === text[charIndex]) {
      correctCount++;
    } else {
      incorrectChars.push(charIndex);
    }
    charIndex++;
  }

  // Append more text when nearing the end
  if (charIndex >= text.length - 40) {
    text += ' ' + generateText(50);
  }
  // Trim old text to prevent unbounded growth
  if (charIndex > 300) {
    const trim = charIndex - 100;
    text = text.slice(trim);
    charIndex -= trim;
    incorrectChars = incorrectChars.filter(i => i >= trim).map(i => i - trim);
  }

  scheduleRender();
});

startTest();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Typing Test</h2><p>Tippe den angezeigten Text so schnell und fehlerfrei wie möglich ab.<br><br><b>Messung:</b> WPM (Wörter pro Minute) und Genauigkeit in Prozent. Der Timer startet beim ersten Tastendruck.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
