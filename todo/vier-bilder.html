<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4 Bilder 1 Wort</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:14px;user-select:none;padding:60px 20px 20px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
.btn{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:6px;padding:6px 16px;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn:hover{background:#0f3460}
.emojis{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:280px}
.emoji-box{background:#16213e;border:1px solid #0f3460;border-radius:12px;font-size:3rem;display:flex;justify-content:center;align-items:center;height:90px}
.answer{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;min-height:50px}
.answer-slot{width:36px;height:42px;background:#0f3460;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:1.3rem;font-weight:bold;color:#c9b458;cursor:pointer;transition:all .2s}
.answer-slot.filled{background:#16213e;border:1px solid #c9b458}
.answer-slot.correct{background:#1a4a2e;border-color:#2ecc71;color:#2ecc71}
.letters{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;max-width:400px}
.letter{width:36px;height:42px;background:#16213e;border:1px solid #0f3460;border-radius:6px;display:flex;justify-content:center;align-items:center;font-size:1.1rem;font-weight:bold;cursor:pointer;transition:all .2s}
.letter:hover{background:#0f3460;border-color:#c9b458}
.letter.used{opacity:.3;pointer-events:none}
#msg{color:#c9b458;font-weight:bold;font-size:1.05rem;min-height:1.5em;text-align:center}
.progress{color:#888;font-size:.85rem}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>4 BILDER 1 WORT</h1>
<p class="progress" id="progress">Rätsel 1/30</p>
<p id="msg">Welches Wort passt zu den 4 Bildern?</p>
<div class="emojis" id="emojis"></div>
<div class="answer" id="answer"></div>
<div class="letters" id="letters"></div>
<div style="display:flex;gap:8px">
<button class="btn" onclick="useHint()">Hinweis</button>
<button class="btn" onclick="clearAnswer()">Leeren</button>
</div>

<script>
const PUZZLES=[
  {emojis:['🌊','🏄','🐚','☀️'],word:'STRAND'},
  {emojis:['🎄','🎅','🎁','⭐'],word:'WEIHNACHTEN'},
  {emojis:['🍕','🍝','🏛️','🇮🇹'],word:'ITALIEN'},
  {emojis:['🎵','🎸','🎤','🎶'],word:'MUSIK'},
  {emojis:['⚽','🏟️','👟','🏆'],word:'FUSSBALL'},
  {emojis:['📚','🤓','🎓','✏️'],word:'SCHULE'},
  {emojis:['🌙','⭐','🦉','🛏️'],word:'NACHT'},
  {emojis:['🍎','🌳','🐛','🥧'],word:'APFEL'},
  {emojis:['❄️','⛷️','🏔️','🧣'],word:'WINTER'},
  {emojis:['🔥','🏕️','🌲','⛺'],word:'LAGER'},
  {emojis:['🐕','🦴','🐾','🏠'],word:'HUND'},
  {emojis:['✈️','🧳','🗺️','🌍'],word:'REISE'},
  {emojis:['🌹','💐','🌷','🌻'],word:'BLUME'},
  {emojis:['🏰','👑','⚔️','🐉'],word:'RITTER'},
  {emojis:['🎂','🎈','🎉','🕯️'],word:'PARTY'},
  {emojis:['🌧️','☂️','💧','🌈'],word:'REGEN'},
  {emojis:['🚗','🛣️','⛽','🏎️'],word:'AUTO'},
  {emojis:['🧀','🐄','🥛','🧈'],word:'MILCH'},
  {emojis:['🎪','🤡','🐘','🎭'],word:'ZIRKUS'},
  {emojis:['🏥','💊','🩺','🤒'],word:'ARZT'},
  {emojis:['🌞','🏖️','🍦','😎'],word:'SOMMER'},
  {emojis:['🐱','🧶','🐟','😺'],word:'KATZE'},
  {emojis:['🍞','🥐','🧁','👨‍🍳'],word:'BROT'},
  {emojis:['⚡','🔌','💡','🔋'],word:'STROM'},
  {emojis:['🎬','🍿','📽️','⭐'],word:'FILM'},
  {emojis:['🏠','🔑','🪟','🚪'],word:'HAUS'},
  {emojis:['🎨','🖌️','🖼️','🎭'],word:'KUNST'},
  {emojis:['🌺','🦋','🐝','🌿'],word:'GARTEN'},
  {emojis:['🏊','🤿','🐠','🌊'],word:'TAUCHEN'},
  {emojis:['🧲','🧪','🔬','💥'],word:'PHYSIK'},
];

let currentIdx=0,answer=[],usedLetters=new Set(),availableLetters=[],hintsUsed=0,totalScore=0;

function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}

function loadPuzzle(){
  const puzzle=PUZZLES[currentIdx];
  answer=[];usedLetters=new Set();hintsUsed=0;
  document.getElementById('progress').textContent=`Rätsel ${currentIdx+1}/${PUZZLES.length} | Punkte: ${totalScore}`;
  document.getElementById('msg').textContent='Welches Wort passt zu den 4 Bildern?';
  // emojis
  const emDiv=document.getElementById('emojis');
  emDiv.innerHTML=puzzle.emojis.map(e=>`<div class="emoji-box">${e}</div>`).join('');
  // letters: word + random extras
  const wordLetters=puzzle.word.split('');
  const extras='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  let pool=[...wordLetters];
  while(pool.length<12)pool.push(extras[Math.floor(Math.random()*extras.length)]);
  availableLetters=shuffle(pool);
  renderLetters();
  renderAnswer();
}

function renderLetters(){
  const div=document.getElementById('letters');
  div.innerHTML='';
  availableLetters.forEach((l,i)=>{
    const el=document.createElement('div');
    el.className='letter'+(usedLetters.has(i)?' used':'');
    el.textContent=l;
    el.onclick=()=>pickLetter(i);
    div.appendChild(el);
  });
}

function renderAnswer(){
  const puzzle=PUZZLES[currentIdx];
  const div=document.getElementById('answer');
  div.innerHTML='';
  for(let i=0;i<puzzle.word.length;i++){
    const el=document.createElement('div');
    el.className='answer-slot'+(answer[i]?' filled':'');
    el.textContent=answer[i]||'';
    el.onclick=()=>removeLetter(i);
    div.appendChild(el);
  }
}

function pickLetter(idx){
  if(usedLetters.has(idx))return;
  const puzzle=PUZZLES[currentIdx];
  if(answer.filter(Boolean).length>=puzzle.word.length)return;
  const pos=answer.findIndex((v,i)=>!v&&i<puzzle.word.length);
  if(pos===-1)return;
  answer[pos]={letter:availableLetters[idx],srcIdx:idx};
  usedLetters.add(idx);
  renderLetters();renderAnswer();
  checkAnswer();
}

function removeLetter(pos){
  if(!answer[pos])return;
  usedLetters.delete(answer[pos].srcIdx);
  answer[pos]=null;
  renderLetters();renderAnswer();
}

function clearAnswer(){
  answer.forEach((a,i)=>{if(a)usedLetters.delete(a.srcIdx);});
  answer=[];
  renderLetters();renderAnswer();
}

function checkAnswer(){
  const puzzle=PUZZLES[currentIdx];
  if(answer.filter(Boolean).length<puzzle.word.length)return;
  const guess=answer.map(a=>a.letter).join('');
  if(guess===puzzle.word){
    totalScore+=Math.max(10,50-hintsUsed*15);
    document.getElementById('msg').textContent='Richtig!';
    // highlight
    document.querySelectorAll('.answer-slot').forEach(el=>el.classList.add('correct'));
    setTimeout(()=>{
      currentIdx++;
      if(currentIdx>=PUZZLES.length){
        document.getElementById('msg').textContent=`Alle gelöst! Gesamtpunkte: ${totalScore}`;
        return;
      }
      loadPuzzle();
    },1200);
  } else {
    document.getElementById('msg').textContent='Nicht ganz richtig...';
  }
}

function useHint(){
  const puzzle=PUZZLES[currentIdx];
  hintsUsed++;
  // reveal first empty correct letter
  for(let i=0;i<puzzle.word.length;i++){
    if(!answer[i]||answer[i].letter!==puzzle.word[i]){
      if(answer[i])usedLetters.delete(answer[i].srcIdx);
      const needed=puzzle.word[i];
      const srcIdx=availableLetters.findIndex((l,j)=>l===needed&&!usedLetters.has(j));
      if(srcIdx>=0){
        answer[i]={letter:needed,srcIdx};
        usedLetters.add(srcIdx);
      }
      break;
    }
  }
  renderLetters();renderAnswer();checkAnswer();
}

loadPuzzle();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Vier Bilder, ein Wort</h2><p>Vier Bilder/Emojis haben etwas gemeinsam. Finde das gesuchte Wort!<br><br><b>Steuerung:</b> Klicke die Buchstaben in der richtigen Reihenfolge an. Hinweis-Button hilft bei Schwierigkeiten.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
