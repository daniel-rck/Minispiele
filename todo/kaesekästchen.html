<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Käsekästchen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:12px;user-select:none;padding:60px 20px 20px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
.btn{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:6px;padding:6px 16px;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn:hover{background:#0f3460}
canvas{border-radius:8px;cursor:pointer}
#msg{color:#c9b458;font-weight:bold;font-size:1.1rem;min-height:1.5em;text-align:center}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
.controls label{color:#888;font-size:.85rem}
.controls select{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:4px;padding:2px 6px}
.score{font-size:1rem}
.score .p1{color:#3498db;font-weight:bold}
.score .p2{color:#e74c3c;font-weight:bold}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>KÄSEKÄSTCHEN</h1>
<div class="controls">
<label>Größe: <select id="sel-size" onchange="newGame()"><option value="4">4x4</option><option value="5" selected>5x5</option><option value="6">6x6</option></select></label>
<button class="btn" onclick="newGame()">Neues Spiel</button>
</div>
<p id="msg">Dein Zug (Blau). Klicke zwischen zwei Punkte.</p>
<p class="score">Du: <span class="p1" id="score1">0</span> | KI: <span class="p2" id="score2">0</span></p>
<canvas id="c"></canvas>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let N=5,GAP=60,PAD=30;
let hLines,vLines,boxes,scores,playerTurn,gameOver;

function newGame(){
  N=parseInt(document.getElementById('sel-size').value);
  GAP=Math.min(60,Math.floor((Math.min(window.innerWidth-40,500))/N));
  canvas.width=PAD*2+N*GAP;
  canvas.height=PAD*2+N*GAP;
  hLines=Array.from({length:N+1},()=>new Int8Array(N));
  vLines=Array.from({length:N},()=>new Int8Array(N+1));
  boxes=Array.from({length:N},()=>new Int8Array(N));
  scores=[0,0];playerTurn=true;gameOver=false;
  document.getElementById('score1').textContent=0;
  document.getElementById('score2').textContent=0;
  document.getElementById('msg').textContent='Dein Zug (Blau). Klicke zwischen zwei Punkte.';
  draw();
}

function draw(){
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  // boxes
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      if(boxes[r][c]){
        ctx.fillStyle=boxes[r][c]===1?'rgba(52,152,219,0.2)':'rgba(231,76,60,0.2)';
        ctx.fillRect(PAD+c*GAP+2,PAD+r*GAP+2,GAP-4,GAP-4);
        ctx.fillStyle=boxes[r][c]===1?'#3498db':'#e74c3c';
        ctx.font='bold 16px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(boxes[r][c]===1?'Du':'KI',PAD+c*GAP+GAP/2,PAD+r*GAP+GAP/2);
      }
    }
  }
  // horizontal lines
  for(let r=0;r<=N;r++){
    for(let c=0;c<N;c++){
      const x1=PAD+c*GAP,y1=PAD+r*GAP,x2=PAD+(c+1)*GAP;
      ctx.strokeStyle=hLines[r][c]?(hLines[r][c]===1?'#3498db':'#e74c3c'):'#0f3460';
      ctx.lineWidth=hLines[r][c]?4:2;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y1);ctx.stroke();
    }
  }
  // vertical lines
  for(let r=0;r<N;r++){
    for(let c=0;c<=N;c++){
      const x1=PAD+c*GAP,y1=PAD+r*GAP,y2=PAD+(r+1)*GAP;
      ctx.strokeStyle=vLines[r][c]?(vLines[r][c]===1?'#3498db':'#e74c3c'):'#0f3460';
      ctx.lineWidth=vLines[r][c]?4:2;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x1,y2);ctx.stroke();
    }
  }
  // dots
  for(let r=0;r<=N;r++){
    for(let c=0;c<=N;c++){
      ctx.fillStyle='#c9b458';
      ctx.beginPath();ctx.arc(PAD+c*GAP,PAD+r*GAP,4,0,Math.PI*2);ctx.fill();
    }
  }
}

function countBoxSides(r,c){
  let count=0;
  if(hLines[r][c])count++;
  if(hLines[r+1][c])count++;
  if(vLines[r][c])count++;
  if(vLines[r][c+1])count++;
  return count;
}

function tryClaimBoxes(who){
  let claimed=0;
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      if(!boxes[r][c]&&countBoxSides(r,c)===4){
        boxes[r][c]=who;
        scores[who-1]++;
        claimed++;
      }
    }
  }
  return claimed;
}

canvas.onclick=function(e){
  if(gameOver||!playerTurn)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  const move=findClosestLine(mx,my);
  if(!move)return;
  if(move.type==='h'){
    if(hLines[move.r][move.c])return;
    hLines[move.r][move.c]=1;
  } else {
    if(vLines[move.r][move.c])return;
    vLines[move.r][move.c]=1;
  }
  const claimed=tryClaimBoxes(1);
  updateScores();
  if(checkEnd())return;
  if(claimed>0){draw();return;}// extra turn
  playerTurn=false;
  draw();
  document.getElementById('msg').textContent='KI denkt nach...';
  setTimeout(aiMove,400);
};

function findClosestLine(mx,my){
  let best=null,bestDist=20;
  // horizontal
  for(let r=0;r<=N;r++){
    for(let c=0;c<N;c++){
      if(hLines[r][c])continue;
      const cx=PAD+(c+0.5)*GAP,cy=PAD+r*GAP;
      const d=Math.hypot(mx-cx,my-cy);
      if(d<bestDist){bestDist=d;best={type:'h',r,c};}
    }
  }
  // vertical
  for(let r=0;r<N;r++){
    for(let c=0;c<=N;c++){
      if(vLines[r][c])continue;
      const cx=PAD+c*GAP,cy=PAD+(r+0.5)*GAP;
      const d=Math.hypot(mx-cx,my-cy);
      if(d<bestDist){bestDist=d;best={type:'v',r,c};}
    }
  }
  return best;
}

function aiMove(){
  // Strategy: claim 4-sided, avoid giving 3rd side, otherwise random
  let move=null;
  // 1. Can we complete a box?
  for(let r=0;r<=N;r++)for(let c=0;c<N;c++){
    if(!hLines[r][c]){
      const adj=getAdjacentBoxes('h',r,c);
      if(adj.some(([br,bc])=>countBoxSides(br,bc)===3)){move={type:'h',r,c};break;}
    }
  }
  if(!move)for(let r=0;r<N;r++)for(let c=0;c<=N;c++){
    if(!vLines[r][c]){
      const adj=getAdjacentBoxes('v',r,c);
      if(adj.some(([br,bc])=>countBoxSides(br,bc)===3)){move={type:'v',r,c};break;}
    }
  }
  // 2. Avoid giving 3rd side
  if(!move){
    const safe=[];
    for(let r=0;r<=N;r++)for(let c=0;c<N;c++){
      if(!hLines[r][c]){
        const adj=getAdjacentBoxes('h',r,c);
        if(!adj.some(([br,bc])=>countBoxSides(br,bc)===2))safe.push({type:'h',r,c});
      }
    }
    for(let r=0;r<N;r++)for(let c=0;c<=N;c++){
      if(!vLines[r][c]){
        const adj=getAdjacentBoxes('v',r,c);
        if(!adj.some(([br,bc])=>countBoxSides(br,bc)===2))safe.push({type:'v',r,c});
      }
    }
    if(safe.length)move=safe[Math.floor(Math.random()*safe.length)];
  }
  // 3. Any remaining
  if(!move){
    const all=[];
    for(let r=0;r<=N;r++)for(let c=0;c<N;c++)if(!hLines[r][c])all.push({type:'h',r,c});
    for(let r=0;r<N;r++)for(let c=0;c<=N;c++)if(!vLines[r][c])all.push({type:'v',r,c});
    if(all.length)move=all[Math.floor(Math.random()*all.length)];
  }
  if(!move)return;
  if(move.type==='h')hLines[move.r][move.c]=2;
  else vLines[move.r][move.c]=2;
  const claimed=tryClaimBoxes(2);
  updateScores();
  if(checkEnd())return;
  if(claimed>0){draw();setTimeout(aiMove,400);return;}
  playerTurn=true;
  document.getElementById('msg').textContent='Dein Zug (Blau).';
  draw();
}

function getAdjacentBoxes(type,r,c){
  const result=[];
  if(type==='h'){
    if(r>0)result.push([r-1,c]);
    if(r<N)result.push([r,c]);
  } else {
    if(c>0)result.push([r,c-1]);
    if(c<N)result.push([r,c]);
  }
  return result.filter(([br,bc])=>br>=0&&br<N&&bc>=0&&bc<N&&!boxes[br][bc]);
}

function updateScores(){
  document.getElementById('score1').textContent=scores[0];
  document.getElementById('score2').textContent=scores[1];
}

function checkEnd(){
  const total=scores[0]+scores[1];
  if(total<N*N)return false;
  gameOver=true;
  if(scores[0]>scores[1])document.getElementById('msg').textContent=`Gewonnen! ${scores[0]}:${scores[1]}`;
  else if(scores[1]>scores[0])document.getElementById('msg').textContent=`Verloren! ${scores[0]}:${scores[1]}`;
  else document.getElementById('msg').textContent=`Unentschieden! ${scores[0]}:${scores[1]}`;
  draw();
  return true;
}

newGame();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Käsekästchen</h2><p>Ziehe abwechselnd eine Linie zwischen zwei Punkten. Wer ein Kästchen schließt (4. Seite), bekommt es und darf nochmal.<br><br><b>Ziel:</b> Schließe mehr Kästchen als der Gegner!</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
