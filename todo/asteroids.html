<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroids</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:10px;user-select:none;padding:60px 10px 10px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
canvas{border-radius:8px}
#info{font-size:.9rem;color:#888}.val{color:#c9b458;font-weight:bold}
.touch-controls{display:none;gap:8px;justify-content:center;flex-wrap:wrap}
.touch-btn{width:50px;height:50px;background:#16213e;border:1px solid #0f3460;border-radius:8px;display:flex;justify-content:center;align-items:center;font-size:1.2rem;color:#c9b458;cursor:pointer}
@media(pointer:coarse){.touch-controls{display:flex}}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>ASTEROIDS</h1>
<canvas id="c" width="700" height="500"></canvas>
<div class="touch-controls" id="touch">
<div class="touch-btn" id="t-left">&#8592;</div>
<div class="touch-btn" id="t-thrust">&#8593;</div>
<div class="touch-btn" id="t-right">&#8594;</div>
<div class="touch-btn" id="t-fire">&#9679;</div>
</div>
<p id="info">Highscore: <span class="val" id="best">0</span></p>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const keys={};
let ship,asteroids,bullets,particles,score,lives,level,gameOver,invincible,invTimer;

function reset(){
  ship={x:W/2,y:H/2,angle:0,vx:0,vy:0};
  asteroids=[];bullets=[];particles=[];
  score=0;lives=3;level=1;gameOver=false;invincible=true;invTimer=120;
  spawnAsteroids(4);
}

function spawnAsteroids(n){
  for(let i=0;i<n;i++){
    let x,y;
    do{x=Math.random()*W;y=Math.random()*H;}while(Math.hypot(x-ship.x,y-ship.y)<100);
    asteroids.push(makeAsteroid(x,y,3));
  }
}

function makeAsteroid(x,y,size){
  const speed=1+Math.random()*1.5;
  const angle=Math.random()*Math.PI*2;
  const r=[40,25,12][3-size];
  const verts=[];
  const n=8+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++){
    const a=i/n*Math.PI*2;
    verts.push(r*(0.7+Math.random()*0.3));
  }
  return{x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,size,r,verts,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*0.03};
}

function update(){
  if(gameOver)return;
  // ship controls
  if(keys.ArrowLeft||keys.a)ship.angle-=0.07;
  if(keys.ArrowRight||keys.d)ship.angle+=0.07;
  if(keys.ArrowUp||keys.w){ship.vx+=Math.cos(ship.angle)*0.12;ship.vy+=Math.sin(ship.angle)*0.12;}
  ship.vx*=0.99;ship.vy*=0.99;
  ship.x=(ship.x+ship.vx+W)%W;
  ship.y=(ship.y+ship.vy+H)%H;

  if(invincible){invTimer--;if(invTimer<=0)invincible=false;}

  // bullets
  for(const b of bullets){b.x+=b.vx;b.y+=b.vy;b.life--;}
  bullets=bullets.filter(b=>b.life>0);

  // asteroids
  for(const a of asteroids){
    a.x=(a.x+a.vx+W)%W;
    a.y=(a.y+a.vy+H)%H;
    a.rot+=a.rotSpeed;
  }

  // bullet-asteroid collision
  for(let i=bullets.length-1;i>=0;i--){
    for(let j=asteroids.length-1;j>=0;j--){
      if(Math.hypot(bullets[i].x-asteroids[j].x,bullets[i].y-asteroids[j].y)<asteroids[j].r){
        const a=asteroids[j];
        score+=[100,50,20][3-a.size];
        for(let k=0;k<6;k++)particles.push({x:a.x,y:a.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:20+Math.random()*15});
        if(a.size>1){
          asteroids.push(makeAsteroid(a.x,a.y,a.size-1));
          asteroids.push(makeAsteroid(a.x,a.y,a.size-1));
        }
        asteroids.splice(j,1);
        bullets.splice(i,1);
        break;
      }
    }
  }

  // ship-asteroid collision
  if(!invincible){
    for(const a of asteroids){
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.r+12){
        lives--;
        for(let k=0;k<15;k++)particles.push({x:ship.x,y:ship.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:25+Math.random()*15});
        if(lives<=0){gameOver=true;return;}
        ship.x=W/2;ship.y=H/2;ship.vx=0;ship.vy=0;
        invincible=true;invTimer=120;
        break;
      }
    }
  }

  // next level
  if(asteroids.length===0){level++;spawnAsteroids(3+level);}

  // particles
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life--;}
  particles=particles.filter(p=>p.life>0);
}

function draw(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);

  // ship
  if(!gameOver){
    if(!invincible||Math.floor(invTimer/4)%2===0){
      ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
      ctx.strokeStyle='#c9b458';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(15,0);ctx.lineTo(-10,-9);ctx.lineTo(-6,0);ctx.lineTo(-10,9);ctx.closePath();ctx.stroke();
      if(keys.ArrowUp||keys.w){
        ctx.fillStyle='#e67e22';
        ctx.beginPath();ctx.moveTo(-8,-4);ctx.lineTo(-16,0);ctx.lineTo(-8,4);ctx.fill();
      }
      ctx.restore();
    }
  }

  // asteroids
  ctx.strokeStyle='#888';ctx.lineWidth=1.5;
  for(const a of asteroids){
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.rot);
    ctx.beginPath();
    for(let i=0;i<a.verts.length;i++){
      const angle=i/a.verts.length*Math.PI*2;
      const r=a.verts[i];
      if(i===0)ctx.moveTo(Math.cos(angle)*r,Math.sin(angle)*r);
      else ctx.lineTo(Math.cos(angle)*r,Math.sin(angle)*r);
    }
    ctx.closePath();ctx.stroke();
    ctx.restore();
  }

  // bullets
  ctx.fillStyle='#f1c40f';
  for(const b of bullets){ctx.beginPath();ctx.arc(b.x,b.y,2,0,Math.PI*2);ctx.fill();}

  // particles
  for(const p of particles){
    ctx.fillStyle=`rgba(201,180,88,${p.life/35})`;
    ctx.fillRect(p.x-1,p.y-1,3,3);
  }

  // HUD
  ctx.fillStyle='#c9b458';ctx.font='bold 18px Segoe UI';ctx.textAlign='left';
  ctx.fillText(`Punkte: ${score}`,10,25);
  ctx.fillText(`Level: ${level}`,10,48);
  ctx.textAlign='right';
  for(let i=0;i<lives;i++){
    ctx.save();ctx.translate(W-20-i*25,25);ctx.rotate(-Math.PI/2);
    ctx.strokeStyle='#c9b458';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(-5,-5);ctx.lineTo(-3,0);ctx.lineTo(-5,5);ctx.closePath();ctx.stroke();
    ctx.restore();
  }

  if(gameOver){
    ctx.fillStyle='rgba(26,26,46,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#c9b458';ctx.font='bold 28px Segoe UI';ctx.textAlign='center';
    ctx.fillText('Game Over!',W/2,H/2-20);
    ctx.font='18px Segoe UI';ctx.fillText(`Punkte: ${score}`,W/2,H/2+15);
    ctx.fillStyle='#888';ctx.font='14px Segoe UI';
    ctx.fillText('Leertaste zum Neustart',W/2,H/2+45);
  }
}

let shootCooldown=0;
function loop(){
  if(shootCooldown>0)shootCooldown--;
  if((keys[' ']||keys.Space)&&!gameOver&&shootCooldown<=0){
    bullets.push({x:ship.x+Math.cos(ship.angle)*15,y:ship.y+Math.sin(ship.angle)*15,vx:Math.cos(ship.angle)*7,vy:Math.sin(ship.angle)*7,life:60});
    shootCooldown=8;
  }
  update();draw();
  requestAnimationFrame(loop);
}

document.onkeydown=e=>{
  keys[e.key]=true;
  if(e.code==='Space'){e.preventDefault();keys.Space=true;if(gameOver)reset();}
};
document.onkeyup=e=>{keys[e.key]=false;if(e.code==='Space')keys.Space=false;};

// touch
['t-left','t-right','t-thrust','t-fire'].forEach(id=>{
  const el=document.getElementById(id);
  const key={['t-left']:'ArrowLeft',['t-right']:'ArrowRight',['t-thrust']:'ArrowUp',['t-fire']:'Space'}[id];
  el.ontouchstart=e=>{e.preventDefault();keys[key]=true;if(key==='Space'&&gameOver)reset();};
  el.ontouchend=e=>{e.preventDefault();keys[key]=false;};
});

const best=localStorage.getItem('asteroids-best');
if(best)document.getElementById('best').textContent=best;
reset();loop();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Asteroids</h2><p>Steuere dein Raumschiff und zerstöre die Asteroiden, bevor sie dich treffen.<br><br><b>Steuerung:</b> Pfeiltasten zum Drehen und Beschleunigen, Leertaste zum Schießen.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
