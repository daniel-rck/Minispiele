<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galgenmännchen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; flex-direction: column; gap: 16px; user-select: none; }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  .controls button { background: #16213e; color: #c9b458; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 16px; font-size: 0.9rem; cursor: pointer; }
  .controls button:hover { background: #0f3460; }
  #info { font-size: 0.9rem; color: #888; }
  .val { color: #c9b458; font-weight: bold; }
  canvas { border-radius: 8px; }
  #word { font-size: 2rem; letter-spacing: 12px; color: #c9b458; font-weight: bold; min-height: 2.5rem; }
  #keyboard { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; max-width: 500px; }
  .key { width: 38px; height: 38px; background: #16213e; border: 1px solid #0f3460; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.15s; }
  .key:hover { background: #0f3460; }
  .key.correct { background: #1a4a2e; border-color: #2ecc71; color: #2ecc71; }
  .key.wrong { background: #3a1a1a; border-color: #e74c3c; color: #e74c3c; opacity: 0.5; }
  .key.disabled { pointer-events: none; opacity: 0.3; }
  #msg { color: #c9b458; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; }
  #hint { color: #888; font-size: 0.85rem; font-style: italic; min-height: 1.2em; }
  a.back-link { position: fixed; top: 16px; left: 16px; color: #c9b458; text-decoration: none; font-size: 1.1rem; padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px; background: #16213e; transition: background 0.2s; z-index: 100; }
  a.back-link:hover { background: #0f3460; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>GALGENMÄNNCHEN</h1>
<div class="controls"><button onclick="newGame()">Neues Wort</button></div>
<div id="info">Gewonnen: <span class="val" id="wins">0</span> | Verloren: <span class="val" id="losses">0</span></div>
<canvas id="canvas" width="200" height="220"></canvas>
<p id="hint"></p>
<div id="word"></div>
<p id="msg"></p>
<div id="keyboard"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const WORDS = [
  { word: 'APFELBAUM', hint: 'Fruchtgewächs im Garten' },
  { word: 'BIBLIOTHEK', hint: 'Hier leiht man Bücher aus' },
  { word: 'COMPUTER', hint: 'Elektronisches Gerät' },
  { word: 'DACHBODEN', hint: 'Raum unter dem Dach' },
  { word: 'EISENBAHN', hint: 'Schienenfahrzeug' },
  { word: 'FAHRRAD', hint: 'Zweirad ohne Motor' },
  { word: 'GEBURTSTAG', hint: 'Jährlicher Ehrentag' },
  { word: 'HANDSCHUH', hint: 'Kleidung für die Hände' },
  { word: 'INSELGRUPPE', hint: 'Mehrere Inseln zusammen' },
  { word: 'JAHRESZEIT', hint: 'Frühling, Sommer, ...' },
  { word: 'KAFFEEMASCHINE', hint: 'Gerät für ein Heißgetränk' },
  { word: 'LEUCHTTURM', hint: 'Navigationszeichen an der Küste' },
  { word: 'MONDSCHEIN', hint: 'Licht in der Nacht' },
  { word: 'NACHTIGALL', hint: 'Singvogel' },
  { word: 'ORDNER', hint: 'Zum Abheften von Papieren' },
  { word: 'PARKPLATZ', hint: 'Hier stellt man das Auto ab' },
  { word: 'REGENBOGEN', hint: 'Buntes Naturphänomen nach Regen' },
  { word: 'SCHMETTERLING', hint: 'Buntes Insekt mit Flügeln' },
  { word: 'TASCHENLAMPE', hint: 'Tragbare Lichtquelle' },
  { word: 'UNTERWASSER', hint: 'Unter der Wasseroberfläche' },
  { word: 'WEIHNACHTEN', hint: 'Fest im Dezember' },
  { word: 'ZAHNBÜRSTE', hint: 'Mundhygiene-Werkzeug' },
  { word: 'ABENTEUER', hint: 'Spannendes Erlebnis' },
  { word: 'BLUMENWIESE', hint: 'Bunte Fläche in der Natur' },
  { word: 'DONNERWETTER', hint: 'Gewitter oder Ausruf' },
  { word: 'FEUERWEHR', hint: 'Rettet bei Bränden' },
  { word: 'GLÜHWÜRMCHEN', hint: 'Leuchtendes Insekt' },
  { word: 'HONIGBIENE', hint: 'Produziert Süßes' },
  { word: 'KINDERGARTEN', hint: 'Betreuung für die Kleinsten' },
  { word: 'MARKTPLATZ', hint: 'Zentrum einer Stadt' },
  { word: 'SONNENBLUME', hint: 'Große gelbe Blume' },
  { word: 'WASSERFALL', hint: 'Wasser fällt in die Tiefe' },
  { word: 'SCHWARZWALD', hint: 'Gebirge in Süddeutschland' },
  { word: 'WANDERSCHUHE', hint: 'Fußbekleidung für Berge' },
  { word: 'KRISTALLKLAR', hint: 'Sehr durchsichtig' },
];

const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZÄÖÜ';
const MAX_WRONG = 7;

let word, hint, guessed, wrongCount, gameOver;
let wins = 0, losses = 0;

function newGame() {
  const entry = WORDS[Math.floor(Math.random() * WORDS.length)];
  word = entry.word;
  hint = entry.hint;
  guessed = new Set();
  wrongCount = 0;
  gameOver = false;
  document.getElementById('msg').textContent = '';
  document.getElementById('hint').textContent = 'Hinweis: ' + hint;
  renderKeyboard();
  renderWord();
  drawGallows();
}

function renderWord() {
  const display = word.split('').map(ch => {
    if (ch === ' ') return '  ';
    return guessed.has(ch) ? ch : '_';
  }).join('');
  document.getElementById('word').textContent = display;
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  for (const ch of LETTERS) {
    const div = document.createElement('div');
    div.className = 'key';
    if (guessed.has(ch)) {
      div.classList.add(word.includes(ch) ? 'correct' : 'wrong');
      div.classList.add('disabled');
    }
    if (gameOver) div.classList.add('disabled');
    div.textContent = ch;
    div.onclick = () => guess(ch);
    kb.appendChild(div);
  }
}

function guess(ch) {
  if (gameOver || guessed.has(ch)) return;
  guessed.add(ch);

  if (!word.includes(ch)) {
    wrongCount++;
  }

  renderWord();
  renderKeyboard();
  drawGallows();

  // Check win
  if (word.split('').every(c => c === ' ' || guessed.has(c))) {
    gameOver = true;
    wins++;
    document.getElementById('wins').textContent = wins;
    document.getElementById('msg').textContent = 'Gewonnen!';
    renderKeyboard();
  }

  // Check lose
  if (wrongCount >= MAX_WRONG) {
    gameOver = true;
    losses++;
    document.getElementById('losses').textContent = losses;
    document.getElementById('msg').textContent = `Verloren! Das Wort war: ${word}`;
    // Reveal word
    guessed = new Set(word.split(''));
    renderWord();
    renderKeyboard();
  }
}

function drawGallows() {
  ctx.clearRect(0, 0, 200, 220);
  ctx.strokeStyle = '#c9b458';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  // Base
  ctx.beginPath(); ctx.moveTo(20, 200); ctx.lineTo(120, 200); ctx.stroke();
  // Pole
  ctx.beginPath(); ctx.moveTo(50, 200); ctx.lineTo(50, 20); ctx.stroke();
  // Top bar
  ctx.beginPath(); ctx.moveTo(50, 20); ctx.lineTo(130, 20); ctx.stroke();
  // Rope
  ctx.beginPath(); ctx.moveTo(130, 20); ctx.lineTo(130, 45); ctx.stroke();

  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 2;

  if (wrongCount >= 1) { // Head
    ctx.beginPath(); ctx.arc(130, 58, 13, 0, Math.PI * 2); ctx.stroke();
  }
  if (wrongCount >= 2) { // Body
    ctx.beginPath(); ctx.moveTo(130, 71); ctx.lineTo(130, 125); ctx.stroke();
  }
  if (wrongCount >= 3) { // Left arm
    ctx.beginPath(); ctx.moveTo(130, 85); ctx.lineTo(105, 105); ctx.stroke();
  }
  if (wrongCount >= 4) { // Right arm
    ctx.beginPath(); ctx.moveTo(130, 85); ctx.lineTo(155, 105); ctx.stroke();
  }
  if (wrongCount >= 5) { // Left leg
    ctx.beginPath(); ctx.moveTo(130, 125); ctx.lineTo(108, 160); ctx.stroke();
  }
  if (wrongCount >= 6) { // Right leg
    ctx.beginPath(); ctx.moveTo(130, 125); ctx.lineTo(152, 160); ctx.stroke();
  }
  if (wrongCount >= 7) { // Face
    ctx.strokeStyle = '#e74c3c';
    ctx.beginPath(); ctx.moveTo(124, 54); ctx.lineTo(128, 58); ctx.moveTo(128, 54); ctx.lineTo(124, 58); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(132, 54); ctx.lineTo(136, 58); ctx.moveTo(136, 54); ctx.lineTo(132, 58); ctx.stroke();
    ctx.beginPath(); ctx.arc(130, 65, 4, 0.2, Math.PI - 0.2); ctx.stroke();
  }
}

document.addEventListener('keydown', e => {
  const ch = e.key.toUpperCase();
  if (LETTERS.includes(ch)) guess(ch);
});

newGame();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Hangman</h2><p>Errate das versteckte Wort, indem du Buchstaben auswählst. Jeder falsche Buchstabe zeichnet ein Stück des Galgenmännchens.<br><br><b>Ziel:</b> Finde das Wort, bevor das Männchen komplett gezeichnet ist!</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
