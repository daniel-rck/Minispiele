<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connections</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:12px;user-select:none;padding:60px 20px 20px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
.btn{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:6px;padding:6px 16px;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn:hover{background:#0f3460}
.btn:disabled{opacity:.4;cursor:default}
#msg{color:#c9b458;font-weight:bold;font-size:1.05rem;min-height:1.5em;text-align:center}
.solved{display:flex;flex-direction:column;gap:6px;width:100%;max-width:440px}
.solved-group{padding:10px;border-radius:8px;text-align:center;font-weight:bold;font-size:.9rem}
.solved-group .label{font-size:.75rem;opacity:.8}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:440px;width:100%}
.word{background:#16213e;border:2px solid #0f3460;border-radius:8px;padding:14px 8px;text-align:center;cursor:pointer;font-weight:bold;font-size:.85rem;transition:all .15s}
.word:hover{border-color:#c9b458}
.word.selected{background:#0f3460;border-color:#c9b458;color:#c9b458}
.mistakes{display:flex;gap:4px;justify-content:center}
.dot{width:12px;height:12px;border-radius:50%;background:#c9b458}
.dot.used{background:#555}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>CONNECTIONS</h1>
<p id="msg">Finde 4 Gruppen mit je 4 zusammengehörigen Wörtern!</p>
<div class="solved" id="solved"></div>
<div class="grid" id="grid"></div>
<div class="mistakes" id="mistakes"></div>
<div style="display:flex;gap:8px;margin-top:4px">
<button class="btn" onclick="clearSelection()">Auswahl löschen</button>
<button class="btn" id="btn-submit" onclick="submitGuess()" disabled>Prüfen</button>
<button class="btn" onclick="newGame()">Neues Rätsel</button>
</div>

<script>
const PUZZLES=[
  {groups:[
    {words:['APFEL','BIRNE','KIRSCHE','PFLAUME'],label:'Obstsorten',color:'#f1c40f'},
    {words:['HAMMER','ZANGE','SÄGE','BOHRER'],label:'Werkzeuge',color:'#2ecc71'},
    {words:['MARS','VENUS','SATURN','JUPITER'],label:'Planeten',color:'#3498db'},
    {words:['KÖNIG','DAME','TURM','LÄUFER'],label:'Schachfiguren',color:'#9b59b6'},
  ]},
  {groups:[
    {words:['ROSE','TULPE','LILIE','NELKE'],label:'Blumen',color:'#f1c40f'},
    {words:['BACH','MOZART','BEETHOVEN','HAYDN'],label:'Komponisten',color:'#2ecc71'},
    {words:['BERLIN','PARIS','ROM','LONDON'],label:'Hauptstädte',color:'#3498db'},
    {words:['GOLD','SILBER','BRONZE','PLATIN'],label:'Edelmetalle',color:'#9b59b6'},
  ]},
  {groups:[
    {words:['TIGER','LÖWE','PUMA','JAGUAR'],label:'Großkatzen',color:'#f1c40f'},
    {words:['ELBE','RHEIN','DONAU','MOSEL'],label:'Flüsse',color:'#2ecc71'},
    {words:['PIZZA','PASTA','RISOTTO','LASAGNE'],label:'Italienische Gerichte',color:'#3498db'},
    {words:['BASS','TENOR','ALT','SOPRAN'],label:'Stimmlagen',color:'#9b59b6'},
  ]},
  {groups:[
    {words:['ADLER','FALKE','HABICHT','BUSSARD'],label:'Greifvögel',color:'#f1c40f'},
    {words:['EICHE','BUCHE','BIRKE','LINDE'],label:'Laubbäume',color:'#2ecc71'},
    {words:['WALZER','TANGO','SALSA','POLKA'],label:'Tänze',color:'#3498db'},
    {words:['HERZ','LUNGE','LEBER','NIERE'],label:'Organe',color:'#9b59b6'},
  ]},
  {groups:[
    {words:['ERDE','WASSER','FEUER','LUFT'],label:'Elemente',color:'#f1c40f'},
    {words:['FRÜHLING','SOMMER','HERBST','WINTER'],label:'Jahreszeiten',color:'#2ecc71'},
    {words:['NORDEN','SÜDEN','OSTEN','WESTEN'],label:'Himmelsrichtungen',color:'#3498db'},
    {words:['FREUDE','TRAUER','ANGST','WUT'],label:'Gefühle',color:'#9b59b6'},
  ]},
];

let puzzle,remaining,selected,solved,mistakes,gameOver;

function newGame(){
  puzzle=PUZZLES[Math.floor(Math.random()*PUZZLES.length)];
  remaining=puzzle.groups.flatMap(g=>g.words).sort(()=>Math.random()-.5);
  selected=new Set();solved=[];mistakes=0;gameOver=false;
  document.getElementById('msg').textContent='Finde 4 Gruppen mit je 4 zusammengehörigen Wörtern!';
  render();
}

function render(){
  // Solved
  const sdiv=document.getElementById('solved');
  sdiv.innerHTML='';
  for(const s of solved){
    const el=document.createElement('div');
    el.className='solved-group';
    el.style.background=s.color;
    el.style.color='#fff';
    el.innerHTML=`<div class="label">${s.label}</div>${s.words.join(', ')}`;
    sdiv.appendChild(el);
  }
  // Grid
  const gdiv=document.getElementById('grid');
  gdiv.innerHTML='';
  for(const word of remaining){
    const el=document.createElement('div');
    el.className='word'+(selected.has(word)?' selected':'');
    el.textContent=word;
    el.onclick=()=>toggleWord(word);
    gdiv.appendChild(el);
  }
  // Mistakes
  const mdiv=document.getElementById('mistakes');
  mdiv.innerHTML='';
  for(let i=0;i<4;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<mistakes?' used':'');
    mdiv.appendChild(d);
  }
  document.getElementById('btn-submit').disabled=selected.size!==4||gameOver;
}

function toggleWord(word){
  if(gameOver)return;
  if(selected.has(word))selected.delete(word);
  else if(selected.size<4)selected.add(word);
  render();
}

function clearSelection(){selected=new Set();render();}

function submitGuess(){
  if(selected.size!==4)return;
  const sel=[...selected];
  // Check against groups
  const match=puzzle.groups.find(g=>g.words.every(w=>sel.includes(w)));
  if(match){
    solved.push(match);
    remaining=remaining.filter(w=>!sel.includes(w));
    selected=new Set();
    if(solved.length===4){
      gameOver=true;
      document.getElementById('msg').textContent='Alle Gruppen gefunden! Perfekt!';
    } else {
      document.getElementById('msg').textContent=`"${match.label}" gefunden!`;
    }
  } else {
    mistakes++;
    selected=new Set();
    if(mistakes>=4){
      gameOver=true;
      // reveal all
      for(const g of puzzle.groups)if(!solved.includes(g))solved.push(g);
      remaining=[];
      document.getElementById('msg').textContent='Leider verloren! Hier die Lösung:';
    } else {
      document.getElementById('msg').textContent=`Falsch! Noch ${4-mistakes} Versuche.`;
    }
  }
  render();
}

newGame();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Connections</h2><p>Finde <b>4 Gruppen</b> von je 4 zusammengehörigen Wörtern. Wähle 4 Wörter aus und bestätige deine Vermutung.<br><br><b>Tipp:</b> Die Gruppen haben jeweils ein gemeinsames Thema. Du hast begrenzte Fehlversuche!</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
