<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif;
    color: #e0e0e0; flex-direction: column; gap: 16px;
    user-select: none;
  }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  #status {
    font-size: 1.1rem; padding: 8px 24px; border-radius: 8px;
    background: #16213e; border: 1px solid #0f3460;
    display: flex; align-items: center; gap: 20px;
  }
  #status.won { background: #1a5c1a; border-color: #3a3; }
  #status.lost { background: #5c1a1a; border-color: #a33; }
  .score-label { color: #888; font-size: 0.85rem; }
  .score-val { color: #c9b458; font-weight: bold; font-size: 1.2rem; }
  #board {
    display: grid; grid-template-columns: repeat(4, 100px); grid-template-rows: repeat(4, 100px);
    gap: 8px; padding: 8px;
    background: #0f3460; border-radius: 8px; border: 3px solid #c9b458;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .tile {
    width: 100px; height: 100px; border-radius: 6px;
    display: flex; justify-content: center; align-items: center;
    font-weight: bold; transition: all 0.12s ease;
  }
  .tile.empty { background: #16213e; }
  .tile.pop { animation: pop 0.2s ease; }
  @keyframes pop {
    0% { transform: scale(0); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .tile.merge { animation: merge 0.2s ease; }
  @keyframes merge {
    50% { transform: scale(1.2); }
  }
  #controls { display: flex; gap: 12px; }
  button {
    padding: 8px 20px; border: 1px solid #c9b458; background: #16213e;
    color: #c9b458; border-radius: 6px; cursor: pointer; font-size: 0.95rem;
    transition: background 0.2s;
  }
  button:hover { background: #0f3460; }
  .hint { color: #666; font-size: 0.85rem; }
  a.back-link {
    position: fixed; top: 16px; left: 16px;
    color: #c9b458; text-decoration: none; font-size: 1.1rem;
    padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px;
    background: #16213e; transition: background 0.2s; z-index: 100;
  }
  a.back-link:hover { background: #0f3460; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">← Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>2048</h1>
<div id="status">
  <span><span class="score-label">Punkte</span><br><span class="score-val" id="score">0</span></span>
  <span><span class="score-label">Rekord</span><br><span class="score-val" id="best">0</span></span>
</div>
<div id="board"></div>
<div id="controls">
  <button onclick="newGame()">Neues Spiel</button>
</div>
<p class="hint">Pfeiltasten oder WASD zum Spielen</p>

<script>
const TILE_STYLES = {
  0:    { bg: '#16213e', color: '#16213e', size: '2rem' },
  2:    { bg: '#eee4da', color: '#776e65', size: '2rem' },
  4:    { bg: '#ede0c8', color: '#776e65', size: '2rem' },
  8:    { bg: '#f2b179', color: '#f9f6f2', size: '2rem' },
  16:   { bg: '#f59563', color: '#f9f6f2', size: '2rem' },
  32:   { bg: '#f67c5f', color: '#f9f6f2', size: '2rem' },
  64:   { bg: '#f65e3b', color: '#f9f6f2', size: '2rem' },
  128:  { bg: '#edcf72', color: '#f9f6f2', size: '1.8rem' },
  256:  { bg: '#edcc61', color: '#f9f6f2', size: '1.8rem' },
  512:  { bg: '#edc850', color: '#f9f6f2', size: '1.8rem' },
  1024: { bg: '#edc53f', color: '#f9f6f2', size: '1.5rem' },
  2048: { bg: '#edc22e', color: '#f9f6f2', size: '1.5rem' },
  4096: { bg: '#3c3a32', color: '#f9f6f2', size: '1.5rem' },
  8192: { bg: '#3c3a32', color: '#f9f6f2', size: '1.3rem' },
};

let grid, score, bestScore, gameOver, won, keepPlaying;
let newTiles, mergedTiles;

function loadBest() {
  return parseInt(localStorage.getItem('2048-best') || '0');
}
function saveBest(s) {
  localStorage.setItem('2048-best', s);
}

function newGame() {
  grid = Array.from({ length: 4 }, () => Array(4).fill(0));
  score = 0; gameOver = false; won = false; keepPlaying = false;
  newTiles = []; mergedTiles = [];
  bestScore = loadBest();
  addRandom();
  addRandom();
  document.getElementById('status').className = '';
  render();
}

function addRandom() {
  const empty = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (empty.length === 0) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  newTiles = [[r, c]];
}

function move(dir) {
  if (gameOver) return;
  const prev = grid.map(r => [...r]);
  mergedTiles = [];
  let moved = false;

  if (dir === 'left' || dir === 'right') {
    for (let r = 0; r < 4; r++) {
      const row = grid[r].filter(v => v !== 0);
      if (dir === 'right') row.reverse();
      const merged = mergeRow(row, r, dir);
      if (dir === 'right') merged.reverse();
      while (merged.length < 4) dir === 'right' ? merged.unshift(0) : merged.push(0);
      grid[r] = merged;
    }
  } else {
    for (let c = 0; c < 4; c++) {
      let col = [];
      for (let r = 0; r < 4; r++) col.push(grid[r][c]);
      col = col.filter(v => v !== 0);
      if (dir === 'down') col.reverse();
      const merged = mergeCol(col, c, dir);
      if (dir === 'down') merged.reverse();
      while (merged.length < 4) dir === 'down' ? merged.unshift(0) : merged.push(0);
      for (let r = 0; r < 4; r++) grid[r][c] = merged[r];
    }
  }

  // Check if anything moved
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (grid[r][c] !== prev[r][c]) moved = true;

  if (moved) {
    addRandom();
    if (score > bestScore) { bestScore = score; saveBest(bestScore); }
    if (!won && hasValue(2048)) {
      won = true;
      if (!keepPlaying) {
        document.getElementById('status').className = 'won';
        keepPlaying = true; // Allow continuing
      }
    }
    if (!canMove()) {
      gameOver = true;
      document.getElementById('status').className = 'lost';
    }
    render();
  }
}

function mergeRow(row, r, dir) {
  const result = [];
  for (let i = 0; i < row.length; i++) {
    if (i + 1 < row.length && row[i] === row[i + 1]) {
      const val = row[i] * 2;
      result.push(val);
      score += val;
      i++;
    } else {
      result.push(row[i]);
    }
  }
  return result;
}

function mergeCol(col, c, dir) {
  const result = [];
  for (let i = 0; i < col.length; i++) {
    if (i + 1 < col.length && col[i] === col[i + 1]) {
      const val = col[i] * 2;
      result.push(val);
      score += val;
      i++;
    } else {
      result.push(col[i]);
    }
  }
  return result;
}

function hasValue(v) {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      if (grid[r][c] === v) return true;
  return false;
}

function canMove() {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++) {
      if (grid[r][c] === 0) return true;
      if (c + 1 < 4 && grid[r][c] === grid[r][c + 1]) return true;
      if (r + 1 < 4 && grid[r][c] === grid[r + 1][c]) return true;
    }
  return false;
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const val = grid[r][c];
      const tile = document.createElement('div');
      tile.className = 'tile' + (val === 0 ? ' empty' : '');
      const style = TILE_STYLES[val] || TILE_STYLES[8192];
      tile.style.background = style.bg;
      tile.style.color = style.color;
      tile.style.fontSize = style.size;
      if (val > 0) tile.textContent = val;

      if (newTiles.some(([nr, nc]) => nr === r && nc === c)) {
        tile.classList.add('pop');
      }

      board.appendChild(tile);
    }
  }
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = bestScore;
}

// --- Input ---
document.addEventListener('keydown', (e) => {
  const map = {
    ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down',
    a: 'left', d: 'right', w: 'up', s: 'down',
    A: 'left', D: 'right', W: 'up', S: 'down'
  };
  if (map[e.key]) {
    e.preventDefault();
    move(map[e.key]);
  }
});

// Touch/swipe
let touchStartX, touchStartY;
document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
document.addEventListener('touchend', (e) => {
  if (!touchStartX) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 30) return;
  if (absDx > absDy) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
  touchStartX = null;
});

newGame();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>2048</h2><p>Verschiebe alle Kacheln mit den <b>Pfeiltasten</b> in eine Richtung. Gleiche Zahlen verschmelzen beim Zusammenstoß. Ziel: Erreiche die Kachel <b>2048</b>!<br><br><b>Steuerung:</b> Pfeiltasten oder Wischen.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
