<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon Says</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; flex-direction: column; gap: 18px; user-select: none; }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  .controls button { background: #16213e; color: #c9b458; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 16px; font-size: 0.9rem; cursor: pointer; }
  .controls button:hover { background: #0f3460; }
  #info { display: flex; gap: 24px; font-size: 1rem; }
  .val { color: #c9b458; font-weight: bold; }
  #board { display: grid; grid-template-columns: repeat(2, 140px); gap: 8px; }
  .pad { width: 140px; height: 140px; border-radius: 16px; cursor: pointer; transition: all 0.15s; opacity: 0.5; border: 3px solid transparent; }
  .pad:hover { opacity: 0.7; }
  .pad.active { opacity: 1; transform: scale(1.05); border-color: #fff; }
  .pad.disabled { cursor: not-allowed; }
  #pad0 { background: #e74c3c; }
  #pad1 { background: #3498db; }
  #pad2 { background: #2ecc71; }
  #pad3 { background: #f1c40f; }
  #msg { color: #c9b458; font-weight: bold; font-size: 1.2rem; min-height: 1.5em; }
  a.back-link { position: fixed; top: 16px; left: 16px; color: #c9b458; text-decoration: none; font-size: 1.1rem; padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px; background: #16213e; transition: background 0.2s; z-index: 100; }
  a.back-link:hover { background: #0f3460; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>SIMON SAYS</h1>
<div class="controls"><button onclick="startGame()">Neues Spiel</button></div>
<div id="info">
  <span>Runde: <span class="val" id="round">0</span></span>
  <span>Rekord: <span class="val" id="high">0</span></span>
</div>
<p id="msg">Klicke auf "Neues Spiel" zum Starten</p>
<div id="board">
  <div class="pad disabled" id="pad0" onclick="padClick(0)"></div>
  <div class="pad disabled" id="pad1" onclick="padClick(1)"></div>
  <div class="pad disabled" id="pad2" onclick="padClick(2)"></div>
  <div class="pad disabled" id="pad3" onclick="padClick(3)"></div>
</div>

<script>
let sequence = [];
let playerIdx = 0;
let round = 0;
let playing = false;
let showingSequence = false;
let highScore = parseInt(localStorage.getItem('simon-high') || '0');

document.getElementById('high').textContent = highScore;

function flashPad(idx, duration) {
  return new Promise(resolve => {
    const pad = document.getElementById('pad' + idx);
    pad.classList.add('active');
    setTimeout(() => {
      pad.classList.remove('active');
      setTimeout(resolve, 150);
    }, duration);
  });
}

async function showSequence() {
  showingSequence = true;
  setPadsDisabled(true);
  document.getElementById('msg').textContent = 'Merke dir die Sequenz...';

  await new Promise(r => setTimeout(r, 500));
  const speed = Math.max(200, 500 - round * 20);
  for (const idx of sequence) {
    await flashPad(idx, speed);
  }

  showingSequence = false;
  setPadsDisabled(false);
  document.getElementById('msg').textContent = 'Dein Zug!';
}

function setPadsDisabled(disabled) {
  for (let i = 0; i < 4; i++) {
    const pad = document.getElementById('pad' + i);
    if (disabled) pad.classList.add('disabled');
    else pad.classList.remove('disabled');
  }
}

function startGame() {
  sequence = [];
  round = 0;
  playing = true;
  document.getElementById('round').textContent = 0;
  nextRound();
}

function nextRound() {
  round++;
  document.getElementById('round').textContent = round;
  playerIdx = 0;
  sequence.push(Math.floor(Math.random() * 4));
  showSequence();
}

async function padClick(idx) {
  if (!playing || showingSequence) return;

  await flashPad(idx, 200);

  if (sequence[playerIdx] === idx) {
    playerIdx++;
    if (playerIdx >= sequence.length) {
      // Round complete
      document.getElementById('msg').textContent = 'Richtig!';
      if (round > highScore) {
        highScore = round;
        localStorage.setItem('simon-high', highScore);
        document.getElementById('high').textContent = highScore;
      }
      setTimeout(nextRound, 800);
    }
  } else {
    // Wrong
    playing = false;
    setPadsDisabled(true);
    document.getElementById('msg').textContent = `Falsch! Du hast ${round - 1} Runden geschafft.`;

    // Flash all red
    for (let i = 0; i < 4; i++) {
      document.getElementById('pad' + i).classList.add('active');
    }
    setTimeout(() => {
      for (let i = 0; i < 4; i++) document.getElementById('pad' + i).classList.remove('active');
    }, 500);
  }
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === '1' || e.key === 'q') padClick(0);
  if (e.key === '2' || e.key === 'w') padClick(1);
  if (e.key === '3' || e.key === 'a') padClick(2);
  if (e.key === '4' || e.key === 's') padClick(3);
});
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Simon Says</h2><p>Merke dir die Reihenfolge der aufleuchtenden Farben und wiederhole sie.<br><br><b>Spielablauf:</b> In jeder Runde kommt eine Farbe dazu. Ein Fehler beendet das Spiel. Wie weit kommst du?</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
