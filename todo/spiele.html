  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

  .grid {

  .card {

    padding: 28px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    color: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201, 180, 88, 0.05), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover::before { opacity: 1; }
  .card:hover {
    border-color: #c9b458;
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(201, 180, 88, 0.15);

  .card-icon {

  .card-title {

    letter-spacing: 1px;

  .card-desc {

  .card-badge {

    font-size: 0.7rem;
    padding: 3px 8px;
    border-radius: 10px;
    background: rgba(201, 180, 88, 0.15);
    color: #c9b458;
    letter-spacing: 0.5px;
  }
  .fav-btn {
    position: absolute;
    top: 10px; left: 10px;
    font-size: 1.3rem;
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    transition: all 0.2s;
    z-index: 2;
    padding: 2px 4px;
    line-height: 1;
  }
  .card:hover .fav-btn { color: #888; }
  .fav-btn:hover { color: #c9b458 !important; transform: scale(1.2); }
  .fav-btn.active {
    color: #c9b458;
  }

function getFavorites() {
  try { return JSON.parse(localStorage.getItem('spiele-favs') || '[]'); }
  catch { return []; }
}

function setFavorites(favs) {
  localStorage.setItem('spiele-favs', JSON.stringify(favs));
}

function toggleFav(href, e) {
  e.preventDefault();
  e.stopPropagation();
  const favs = getFavorites();
  const idx = favs.indexOf(href);
  if (idx >= 0) favs.splice(idx, 1);
  else favs.push(href);
  setFavorites(favs);
  renderAll();
}

function createCard(game, isFav) {
  const a = document.createElement('a');
  a.href = game.href;
  a.className = 'card';
  a.innerHTML = `
    <span class="card-badge">${game.badge}</span>
    <div class="card-icon">${game.icon}</div>
    <div class="card-title">${game.title}</div>
    <div class="card-desc">${game.desc}</div>
  `;
  const btn = document.createElement('button');
  btn.className = 'fav-btn' + (isFav ? ' active' : '');
  btn.textContent = isFav ? '★' : '☆';
  btn.title = isFav ? 'Aus Favoriten entfernen' : 'Zu Favoriten hinzufügen';
  btn.onclick = (e) => toggleFav(game.href, e);
  a.appendChild(btn);
  return a;
}

function renderAll() {
  const favs = getFavorites();
  const favGames = favs.map(href => GAMES.find(g => g.href === href)).filter(Boolean);
  const hasFavs = favGames.length > 0;

  const favLabel = document.getElementById('fav-label');
  const favGrid = document.getElementById('fav-grid');
  const allLabel = document.getElementById('all-label');
  const allGrid = document.getElementById('all-grid');

  favLabel.style.display = hasFavs ? 'flex' : 'none';
  favGrid.style.display = hasFavs ? 'grid' : 'none';
  allLabel.style.display = hasFavs ? 'flex' : 'none';

  favGrid.innerHTML = '';
  for (const g of favGames) {
    favGrid.appendChild(createCard(g, true));
  }

  allGrid.innerHTML = '';
  for (const g of GAMES) {
    const isFav = favs.includes(g.href);
    allGrid.appendChild(createCard(g, isFav));
  }
}

renderAll();
