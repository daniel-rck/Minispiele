<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nonogramm</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; flex-direction: column; gap: 14px; user-select: none; }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  .controls { display: flex; gap: 12px; align-items: center; }
  .controls button { background: #16213e; color: #c9b458; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 16px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
  .controls button:hover { background: #0f3460; }
  .controls button.active { background: #c9b458; color: #1a1a2e; }
  #board { display: inline-block; background: #16213e; border: 2px solid #0f3460; border-radius: 8px; padding: 4px; }
  table { border-collapse: collapse; }
  td { width: 28px; height: 28px; text-align: center; vertical-align: middle; font-size: 0.7rem; color: #888; }
  td.cell { border: 1px solid #0f3460; cursor: pointer; background: #1a1a2e; transition: background 0.1s; }
  td.cell:hover { background: #222244; }
  td.cell.filled { background: #c9b458; }
  td.cell.marked { background: #1a1a2e; position: relative; }
  td.cell.marked::after { content: 'X'; color: #555; font-size: 0.9rem; font-weight: bold; }
  td.cell.error { background: #5c1a1a; }
  td.hint-col { font-weight: bold; color: #c9b458; vertical-align: bottom; padding-bottom: 4px; font-size: 0.65rem; }
  td.hint-row { font-weight: bold; color: #c9b458; text-align: right; padding-right: 6px; font-size: 0.65rem; white-space: nowrap; }
  td.corner { }
  #msg { font-size: 1.1rem; color: #c9b458; min-height: 1.5em; font-weight: bold; }
  #timer { color: #888; font-size: 0.9rem; }
  a.back-link { position: fixed; top: 16px; left: 16px; color: #c9b458; text-decoration: none; font-size: 1.1rem; padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px; background: #16213e; transition: background 0.2s; z-index: 100; }
  a.back-link:hover { background: #0f3460; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>NONOGRAMM</h1>
<div class="controls">
  <button id="btn5" onclick="startGame(5)" class="active">5x5</button>
  <button id="btn10" onclick="startGame(10)">10x10</button>
  <button id="btn15" onclick="startGame(15)">15x15</button>
  <button id="btnNew" onclick="startGame(currentSize)">Neu</button>
</div>
<p id="timer">00:00</p>
<div id="board"></div>
<p id="msg"></p>

<script>
let currentSize = 5;
let solution = [];
let playerGrid = [];
let solved = false;
let startTime = 0;
let timerInterval = null;

function generatePuzzle(size) {
  const grid = [];
  // Generate random pattern with ~40-50% fill
  const density = 0.4 + Math.random() * 0.15;
  for (let r = 0; r < size; r++) {
    grid[r] = [];
    for (let c = 0; c < size; c++) {
      grid[r][c] = Math.random() < density ? 1 : 0;
    }
  }
  return grid;
}

function getHints(line) {
  const hints = [];
  let count = 0;
  for (const cell of line) {
    if (cell === 1) { count++; }
    else if (count > 0) { hints.push(count); count = 0; }
  }
  if (count > 0) hints.push(count);
  return hints.length > 0 ? hints : [0];
}

function getRowHints(grid, row) {
  return getHints(grid[row]);
}

function getColHints(grid, col) {
  return getHints(grid.map(r => r[col]));
}

function startGame(size) {
  currentSize = size;
  solved = false;
  document.getElementById('msg').textContent = '';
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + size)?.classList.add('active');

  solution = generatePuzzle(size);
  playerGrid = Array.from({ length: size }, () => Array(size).fill(0)); // 0=empty, 1=filled, 2=marked

  // Timer
  clearInterval(timerInterval);
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);

  render();
}

function updateTimer() {
  if (solved) return;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const sec = String(elapsed % 60).padStart(2, '0');
  document.getElementById('timer').textContent = `${min}:${sec}`;
}

function render() {
  const size = currentSize;
  const rowHints = [];
  const colHints = [];
  for (let r = 0; r < size; r++) rowHints.push(getRowHints(solution, r));
  for (let c = 0; c < size; c++) colHints.push(getColHints(solution, c));

  const maxRowHints = Math.max(...rowHints.map(h => h.length));
  const maxColHints = Math.max(...colHints.map(h => h.length));

  let html = '<table>';

  // Column hints
  for (let h = 0; h < maxColHints; h++) {
    html += '<tr>';
    for (let i = 0; i < maxRowHints; i++) html += '<td class="corner"></td>';
    for (let c = 0; c < size; c++) {
      const hints = colHints[c];
      const idx = h - (maxColHints - hints.length);
      html += `<td class="hint-col">${idx >= 0 ? hints[idx] : ''}</td>`;
    }
    html += '</tr>';
  }

  // Rows
  for (let r = 0; r < size; r++) {
    html += '<tr>';
    const hints = rowHints[r];
    for (let i = 0; i < maxRowHints; i++) {
      const idx = i - (maxRowHints - hints.length);
      html += `<td class="hint-row">${idx >= 0 ? hints[idx] : ''}</td>`;
    }
    for (let c = 0; c < size; c++) {
      let cls = 'cell';
      if (playerGrid[r][c] === 1) cls += ' filled';
      else if (playerGrid[r][c] === 2) cls += ' marked';
      html += `<td class="${cls}" data-r="${r}" data-c="${c}"></td>`;
    }
    html += '</tr>';
  }

  html += '</table>';
  document.getElementById('board').innerHTML = html;

  // Click handlers
  document.querySelectorAll('td.cell').forEach(td => {
    td.addEventListener('click', e => {
      if (solved) return;
      const r = parseInt(td.dataset.r);
      const c = parseInt(td.dataset.c);
      if (playerGrid[r][c] === 0) playerGrid[r][c] = 1;
      else if (playerGrid[r][c] === 1) playerGrid[r][c] = 0;
      render();
      checkSolution();
    });
    td.addEventListener('contextmenu', e => {
      e.preventDefault();
      if (solved) return;
      const r = parseInt(td.dataset.r);
      const c = parseInt(td.dataset.c);
      if (playerGrid[r][c] === 0) playerGrid[r][c] = 2;
      else if (playerGrid[r][c] === 2) playerGrid[r][c] = 0;
      render();
    });
  });
}

function checkSolution() {
  for (let r = 0; r < currentSize; r++) {
    for (let c = 0; c < currentSize; c++) {
      const filled = playerGrid[r][c] === 1;
      if (filled !== (solution[r][c] === 1)) return;
    }
  }
  solved = true;
  clearInterval(timerInterval);
  document.getElementById('msg').textContent = 'Gelöst!';
}

startGame(5);
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Nonogramm</h2><p>Fülle Zellen anhand der Zahlenhinweise an den Rändern aus. Die Zahlen geben die Länge zusammenhängender Blöcke in der Zeile/Spalte an.<br><br><b>Steuerung:</b> Linksklick = füllen, Rechtsklick = als leer markieren (X).</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
