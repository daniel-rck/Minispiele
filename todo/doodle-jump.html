<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Jump</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:10px;user-select:none;padding:60px 10px 10px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
canvas{border-radius:8px}
#info{font-size:.9rem;color:#888}.val{color:#c9b458;font-weight:bold}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>DOODLE JUMP</h1>
<canvas id="c" width="400" height="600"></canvas>
<p id="info">Highscore: <span class="val" id="best">0</span></p>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const keys={};
let player,platforms,score,maxY,gameOver,started;

function reset(){
  player={x:W/2,y:H-100,vy:0,w:30,h:30};
  platforms=[];score=0;maxY=H;gameOver=false;started=false;
  // initial platforms
  for(let i=0;i<8;i++){
    platforms.push(makePlatform(Math.random()*(W-70),H-i*80));
  }
  platforms.push({x:W/2-35,y:H-40,w:70,type:'normal',vx:0});// starting platform
}

function makePlatform(x,y){
  const r=Math.random();
  let type='normal',vx=0;
  if(r<0.15&&score>500)type='fragile';
  else if(r<0.3&&score>200){type='moving';vx=1+Math.random()*1.5;}
  else if(r<0.38&&score>800)type='spring';
  return{x,y,w:70,type,vx};
}

function update(){
  if(gameOver||!started)return;
  // horizontal movement
  if(keys.ArrowLeft||keys.a)player.x-=5;
  if(keys.ArrowRight||keys.d)player.x+=5;
  // wrap
  if(player.x<-player.w)player.x=W;
  if(player.x>W)player.x=-player.w;

  player.vy+=0.4;// gravity
  player.y+=player.vy;

  // platform collision (only falling)
  if(player.vy>0){
    for(const p of platforms){
      if(player.x+player.w>p.x&&player.x<p.x+p.w&&
         player.y+player.h>p.y&&player.y+player.h<p.y+12&&player.vy>0){
        if(p.type==='fragile'){p.broken=true;continue;}
        player.vy=p.type==='spring'?-18:-11;
      }
    }
  }

  // move platforms
  for(const p of platforms){
    if(p.type==='moving'){p.x+=p.vx;if(p.x<0||p.x+p.w>W)p.vx*=-1;}
  }

  // camera scroll
  if(player.y<H/3){
    const diff=H/3-player.y;
    player.y=H/3;
    for(const p of platforms)p.y+=diff;
    score+=Math.floor(diff);
  }

  // remove off-screen platforms, add new ones
  platforms=platforms.filter(p=>p.y<H+50&&!p.broken);
  while(platforms.length<8){
    const topY=Math.min(...platforms.map(p=>p.y));
    const gap=50+Math.random()*40+(score>2000?20:0);
    platforms.push(makePlatform(Math.random()*(W-70),topY-gap));
  }

  // game over
  if(player.y>H+50){
    gameOver=true;
    const best=parseInt(localStorage.getItem('doodle-best')||'0');
    if(score>best)localStorage.setItem('doodle-best',score);
    document.getElementById('best').textContent=localStorage.getItem('doodle-best');
  }
}

function draw(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);

  // platforms
  for(const p of platforms){
    if(p.broken)continue;
    const colors={normal:'#2ecc71',moving:'#3498db',fragile:'#8B4513',spring:'#e74c3c'};
    ctx.fillStyle=colors[p.type]||'#2ecc71';
    ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,10,4);ctx.fill();
    if(p.type==='spring'){
      ctx.fillStyle='#c9b458';
      ctx.fillRect(p.x+p.w/2-4,p.y-8,8,8);
    }
  }

  // player
  if(!gameOver){
    ctx.fillStyle='#c9b458';
    ctx.beginPath();ctx.roundRect(player.x,player.y,player.w,player.h,6);ctx.fill();
    // eyes
    ctx.fillStyle='#1a1a2e';
    ctx.beginPath();ctx.arc(player.x+10,player.y+12,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(player.x+20,player.y+12,3,0,Math.PI*2);ctx.fill();
  }

  // score
  ctx.fillStyle='#c9b458';ctx.font='bold 18px Segoe UI';ctx.textAlign='left';
  ctx.fillText(`${score}m`,10,30);

  if(!started&&!gameOver){
    ctx.fillStyle='rgba(26,26,46,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#c9b458';ctx.font='bold 22px Segoe UI';ctx.textAlign='center';
    ctx.fillText('Pfeiltasten/Touch zum Starten',W/2,H/2);
  }

  if(gameOver){
    ctx.fillStyle='rgba(26,26,46,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#c9b458';ctx.font='bold 28px Segoe UI';ctx.textAlign='center';
    ctx.fillText('Game Over!',W/2,H/2-20);
    ctx.font='18px Segoe UI';ctx.fillText(`Höhe: ${score}m`,W/2,H/2+15);
    ctx.fillStyle='#888';ctx.font='14px Segoe UI';
    ctx.fillText('Leertaste/Klick zum Neustart',W/2,H/2+45);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}

document.onkeydown=e=>{
  keys[e.key]=true;keys[e.code]=true;
  if(!started&&!gameOver){started=true;player.vy=-11;}
  if(gameOver&&(e.code==='Space'))reset();
};
document.onkeyup=e=>{keys[e.key]=false;keys[e.code]=false;};

let touchStartX=null;
canvas.ontouchstart=e=>{
  e.preventDefault();
  touchStartX=e.touches[0].clientX;
  if(!started&&!gameOver){started=true;player.vy=-11;}
  if(gameOver)reset();
};
canvas.ontouchmove=e=>{
  e.preventDefault();
  if(touchStartX!==null){
    const dx=e.touches[0].clientX-touchStartX;
    player.x+=dx*0.5;
    touchStartX=e.touches[0].clientX;
  }
};
canvas.ontouchend=()=>touchStartX=null;

const best=localStorage.getItem('doodle-best');
if(best)document.getElementById('best').textContent=best;
reset();loop();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Doodle Jump</h2><p>Springe von Plattform zu Plattform und steige so hoch wie möglich, ohne herunterzufallen.<br><br><b>Steuerung:</b> Pfeiltasten links/rechts oder Maus/Touch zum Steuern.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
