<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Shooter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:10px;user-select:none;padding:60px 10px 10px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
canvas{border-radius:8px;cursor:crosshair}
#info{font-size:.9rem;color:#888}.val{color:#c9b458;font-weight:bold}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>BUBBLE SHOOTER</h1>
<canvas id="c" width="400" height="560"></canvas>
<p id="info">Punkte: <span class="val" id="score">0</span> | Highscore: <span class="val" id="best">0</span></p>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const COLS=10,R=18,COLORS=['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22'];
let grid,shooter,bullet,aimAngle,score,gameOver,animating;

function newGame(){
  grid=Array.from({length:12},()=>Array(COLS).fill(-1));
  for(let r=0;r<5;r++)for(let c=0;c<COLS;c++){
    if(r%2===1&&c===COLS-1)continue;
    grid[r][c]=Math.floor(Math.random()*5);
  }
  shooter={color:Math.floor(Math.random()*5),next:Math.floor(Math.random()*5)};
  bullet=null;aimAngle=-Math.PI/2;score=0;gameOver=false;animating=false;
  draw();
}

function bubblePos(r,c){
  const offset=r%2===1?R:0;
  return{x:R+c*R*2+offset,y:R+r*R*1.73};
}

function draw(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
  // Grid bubbles
  for(let r=0;r<grid.length;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]<0)continue;
      const{x,y}=bubblePos(r,c);
      drawBubble(x,y,grid[r][c]);
    }
  }
  // Aim line
  const sx=W/2,sy=H-40;
  ctx.strokeStyle='rgba(201,180,88,0.3)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(sx,sy);
  ctx.lineTo(sx+Math.cos(aimAngle)*200,sy+Math.sin(aimAngle)*200);
  ctx.stroke();ctx.setLineDash([]);
  // Shooter
  drawBubble(sx,sy,shooter.color);
  drawBubble(sx+40,sy,shooter.next,10);
  // Bullet
  if(bullet)drawBubble(bullet.x,bullet.y,bullet.color);
  // Score
  ctx.fillStyle='#c9b458';ctx.font='bold 16px Segoe UI';ctx.textAlign='right';
  ctx.fillText(`${score}`,W-10,H-10);
  if(gameOver){
    ctx.fillStyle='rgba(26,26,46,0.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#c9b458';ctx.font='bold 24px Segoe UI';ctx.textAlign='center';
    ctx.fillText('Game Over!',W/2,H/2);
    ctx.font='14px Segoe UI';ctx.fillText('Klick zum Neustart',W/2,H/2+30);
  }
}

function drawBubble(x,y,colorIdx,r){
  r=r||R-1;
  ctx.fillStyle=COLORS[colorIdx];
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();ctx.arc(x-r*0.25,y-r*0.25,r*0.35,0,Math.PI*2);ctx.fill();
}

canvas.onmousemove=function(e){
  if(animating||gameOver)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  aimAngle=Math.atan2(my-(H-40),mx-W/2);
  if(aimAngle>-0.15)aimAngle=-0.15;
  if(aimAngle<-Math.PI+0.15)aimAngle=-Math.PI+0.15;
  draw();
};

canvas.onclick=function(e){
  if(gameOver){newGame();return;}
  if(animating||bullet)return;
  shoot();
};

canvas.ontouchstart=function(e){
  e.preventDefault();
  if(gameOver){newGame();return;}
  const rect=canvas.getBoundingClientRect();
  const mx=(e.touches[0].clientX-rect.left)*(W/rect.width);
  const my=(e.touches[0].clientY-rect.top)*(H/rect.height);
  aimAngle=Math.atan2(my-(H-40),mx-W/2);
  if(aimAngle>-0.15)aimAngle=-0.15;
  if(aimAngle<-Math.PI+0.15)aimAngle=-Math.PI+0.15;
  shoot();
};

function shoot(){
  animating=true;
  bullet={x:W/2,y:H-40,vx:Math.cos(aimAngle)*10,vy:Math.sin(aimAngle)*10,color:shooter.color};
  shooter.color=shooter.next;
  shooter.next=Math.floor(Math.random()*5);
}

function update(){
  if(!bullet)return;
  bullet.x+=bullet.vx;
  bullet.y+=bullet.vy;
  // wall bounce
  if(bullet.x<R){bullet.x=R;bullet.vx*=-1;}
  if(bullet.x>W-R){bullet.x=W-R;bullet.vx*=-1;}
  // check collision with grid
  for(let r=0;r<grid.length;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]<0)continue;
      const{x,y}=bubblePos(r,c);
      if(Math.hypot(bullet.x-x,bullet.y-y)<R*1.8){
        snapBubble();return;
      }
    }
  }
  // top wall
  if(bullet.y<R){snapBubble();return;}
}

function snapBubble(){
  // Find closest empty cell
  let bestR=0,bestC=0,bestDist=Infinity;
  for(let r=0;r<grid.length;r++){
    const maxC=r%2===1?COLS-1:COLS;
    for(let c=0;c<maxC;c++){
      if(grid[r][c]>=0)continue;
      const{x,y}=bubblePos(r,c);
      const d=Math.hypot(bullet.x-x,bullet.y-y);
      if(d<bestDist){bestDist=d;bestR=r;bestC=c;}
    }
  }
  grid[bestR][bestC]=bullet.color;
  bullet=null;
  // Check matches
  const matched=findMatches(bestR,bestC);
  if(matched.length>=3){
    for(const[mr,mc]of matched)grid[mr][mc]=-1;
    score+=matched.length*10;
    // Remove floating
    const floating=findFloating();
    for(const[fr,fc]of floating)grid[fr][fc]=-1;
    score+=floating.length*5;
  }
  // Check game over
  const lastRow=grid.length-1;
  if(grid[lastRow].some(c=>c>=0)){
    gameOver=true;
    const best=parseInt(localStorage.getItem('bubble-best')||'0');
    if(score>best)localStorage.setItem('bubble-best',score);
    document.getElementById('best').textContent=localStorage.getItem('bubble-best');
  }
  document.getElementById('score').textContent=score;
  animating=false;
}

function findMatches(r,c){
  const color=grid[r][c];
  const visited=new Set();
  const queue=[[r,c]];
  visited.add(r+','+c);
  while(queue.length){
    const[cr,cc]=queue.shift();
    const neighbors=getNeighbors(cr,cc);
    for(const[nr,nc]of neighbors){
      const key=nr+','+nc;
      if(!visited.has(key)&&nr>=0&&nr<grid.length&&nc>=0&&nc<COLS&&grid[nr][nc]===color){
        visited.add(key);queue.push([nr,nc]);
      }
    }
  }
  return[...visited].map(k=>k.split(',').map(Number));
}

function getNeighbors(r,c){
  const even=r%2===0;
  return even?
    [[r-1,c-1],[r-1,c],[r,c-1],[r,c+1],[r+1,c-1],[r+1,c]]:
    [[r-1,c],[r-1,c+1],[r,c-1],[r,c+1],[r+1,c],[r+1,c+1]];
}

function findFloating(){
  const connected=new Set();
  const queue=[];
  for(let c=0;c<COLS;c++){
    if(grid[0][c]>=0){queue.push([0,c]);connected.add('0,'+c);}
  }
  while(queue.length){
    const[cr,cc]=queue.shift();
    for(const[nr,nc]of getNeighbors(cr,cc)){
      const key=nr+','+nc;
      if(!connected.has(key)&&nr>=0&&nr<grid.length&&nc>=0&&nc<COLS&&grid[nr][nc]>=0){
        connected.add(key);queue.push([nr,nc]);
      }
    }
  }
  const floating=[];
  for(let r=0;r<grid.length;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]>=0&&!connected.has(r+','+c))floating.push([r,c]);
  }
  return floating;
}

function loop(){update();draw();requestAnimationFrame(loop);}
const best=localStorage.getItem('bubble-best');
if(best)document.getElementById('best').textContent=best;
newGame();loop();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Bubble Shooter</h2><p>Schieße farbige Blasen nach oben und bilde Gruppen von <b>3 oder mehr</b> gleichen Farben, um sie platzen zu lassen.<br><br><b>Steuerung:</b> Maus zum Zielen, Klick zum Schießen. Nicht verbundene Blasen fallen ebenfalls herunter.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
