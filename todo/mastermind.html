<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastermind</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:12px;user-select:none;padding:60px 20px 20px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
.btn{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:6px;padding:6px 16px;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn:hover{background:#0f3460}
.btn:disabled{opacity:.4;cursor:default}
#info{font-size:.9rem;color:#888}.val{color:#c9b458;font-weight:bold}
.board{display:flex;flex-direction:column;gap:6px;align-items:center}
.row{display:flex;gap:6px;align-items:center}
.peg{width:40px;height:40px;border-radius:50%;border:2px solid #0f3460;cursor:pointer;transition:all .2s}
.peg:hover{transform:scale(1.1)}
.peg.empty{background:#16213e}
.feedback{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-left:10px}
.fb-peg{width:14px;height:14px;border-radius:50%;border:1px solid #0f3460}
.fb-black{background:#e0e0e0}
.fb-white{background:#888}
.fb-empty{background:#16213e}
.palette{display:flex;gap:10px;margin:12px 0}
.pal-color{width:44px;height:44px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.pal-color:hover,.pal-color.selected{border-color:#c9b458;transform:scale(1.15)}
.secret-row{display:flex;gap:6px;align-items:center}
.secret-peg{width:40px;height:40px;border-radius:50%;background:#0f3460;border:2px solid #c9b458}
.secret-peg.revealed{border-color:transparent}
#msg{color:#c9b458;font-weight:bold;font-size:1.1rem;min-height:1.5em;text-align:center}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.row-num{width:24px;text-align:right;color:#888;font-size:.85rem}
.settings{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
.settings label{color:#888;font-size:.85rem}
.settings select{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:4px;padding:2px 6px}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>MASTERMIND</h1>
<div class="settings">
<label>Versuche: <select id="sel-attempts"><option value="8">8</option><option value="10" selected>10</option><option value="12">12</option></select></label>
</div>
<p id="msg">Wähle eine Farbe und klicke auf ein Feld.</p>
<div class="secret-row" id="secret-row"></div>
<div class="board" id="board"></div>
<div class="palette" id="palette"></div>
<div class="controls">
<button class="btn" id="btn-check" onclick="checkGuess()" disabled>Prüfen</button>
<button class="btn" onclick="clearRow()">Zeile leeren</button>
<button class="btn" onclick="newGame()">Neues Spiel</button>
</div>
<p id="info">Bestzeit: <span class="val" id="best">-</span></p>

<script>
const COLORS=['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22'];
const COLOR_NAMES=['Rot','Blau','Grün','Gelb','Lila','Orange'];
let secret=[],maxAttempts=10,currentRow=0,currentGuess=[null,null,null,null],selectedColor=0,gameOver=false,startTime;

function newGame(){
  maxAttempts=parseInt(document.getElementById('sel-attempts').value);
  secret=[];for(let i=0;i<4;i++)secret.push(Math.floor(Math.random()*6));
  currentRow=0;currentGuess=[null,null,null,null];gameOver=false;
  startTime=Date.now();
  document.getElementById('msg').textContent='Wähle eine Farbe und klicke auf ein Feld.';
  render();
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=maxAttempts-1;r>=0;r--){
    const row=document.createElement('div');
    row.className='row';
    const num=document.createElement('span');
    num.className='row-num';num.textContent=r+1;
    row.appendChild(num);
    for(let c=0;c<4;c++){
      const peg=document.createElement('div');
      peg.className='peg';
      if(r<currentRow&&board.children.length>=0){
        // already guessed rows handled below
      }
      if(r===currentRow&&!gameOver){
        peg.className='peg'+(currentGuess[c]!==null?'':' empty');
        if(currentGuess[c]!==null)peg.style.background=COLORS[currentGuess[c]];
        else peg.style.background='';
        peg.onclick=(()=>{const col=c;return()=>{currentGuess[col]=selectedColor;render();};})();
      } else {
        peg.className='peg empty';
        peg.style.cursor='default';
      }
      row.appendChild(peg);
    }
    const fb=document.createElement('div');
    fb.className='feedback';
    for(let i=0;i<4;i++){const p=document.createElement('div');p.className='fb-peg fb-empty';fb.appendChild(p);}
    row.appendChild(fb);
    row.dataset.row=r;
    board.appendChild(row);
  }
  renderHistory();
  renderPalette();
  renderSecret();
  document.getElementById('btn-check').disabled=currentGuess.includes(null)||gameOver;
}

let history=[];
function renderHistory(){
  const rows=document.getElementById('board').children;
  for(let i=0;i<history.length;i++){
    const r=maxAttempts-1-i;
    for(const row of rows){
      if(parseInt(row.dataset.row)===i){
        const pegs=row.querySelectorAll('.peg');
        for(let c=0;c<4;c++){
          pegs[c].className='peg';
          pegs[c].style.background=COLORS[history[i].guess[c]];
          pegs[c].style.cursor='default';
          pegs[c].onclick=null;
        }
        const fbs=row.querySelectorAll('.fb-peg');
        let fi=0;
        for(let b=0;b<history[i].black;b++)fbs[fi++].className='fb-peg fb-black';
        for(let w=0;w<history[i].white;w++)fbs[fi++].className='fb-peg fb-white';
      }
    }
  }
}

function renderPalette(){
  const pal=document.getElementById('palette');
  pal.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='pal-color'+(i===selectedColor?' selected':'');
    d.style.background=c;
    d.title=COLOR_NAMES[i];
    d.onclick=()=>{selectedColor=i;renderPalette();};
    pal.appendChild(d);
  });
}

function renderSecret(){
  const sr=document.getElementById('secret-row');
  sr.innerHTML='';
  for(let i=0;i<4;i++){
    const p=document.createElement('div');
    if(gameOver){p.className='secret-peg revealed';p.style.background=COLORS[secret[i]];}
    else{p.className='secret-peg';p.textContent='?';p.style.display='flex';p.style.justifyContent='center';p.style.alignItems='center';p.style.color='#c9b458';p.style.fontWeight='bold';}
    sr.appendChild(p);
  }
}

function getFeedback(guess,secret){
  let black=0,white=0;
  const sUsed=[...secret],gUsed=[...guess];
  for(let i=0;i<4;i++){if(gUsed[i]===sUsed[i]){black++;sUsed[i]=-1;gUsed[i]=-2;}}
  for(let i=0;i<4;i++){if(gUsed[i]<0)continue;const idx=sUsed.indexOf(gUsed[i]);if(idx>=0){white++;sUsed[idx]=-1;}}
  return{black,white};
}

function checkGuess(){
  if(currentGuess.includes(null)||gameOver)return;
  const fb=getFeedback(currentGuess,secret);
  history.push({guess:[...currentGuess],black:fb.black,white:fb.white});
  if(fb.black===4){
    gameOver=true;
    const t=((Date.now()-startTime)/1000).toFixed(1);
    document.getElementById('msg').textContent=`Gewonnen in ${currentRow+1} Versuchen! (${t}s)`;
    const best=localStorage.getItem('mastermind-best');
    if(!best||parseFloat(t)<parseFloat(best)){localStorage.setItem('mastermind-best',t);}
    document.getElementById('best').textContent=localStorage.getItem('mastermind-best')+'s';
  } else if(currentRow+1>=maxAttempts){
    gameOver=true;
    document.getElementById('msg').textContent='Leider verloren! Der Code war:';
  } else {
    document.getElementById('msg').textContent=`Versuch ${currentRow+1}: ${fb.black} schwarz, ${fb.white} weiß`;
  }
  currentRow++;
  currentGuess=[null,null,null,null];
  render();
}

function clearRow(){
  currentGuess=[null,null,null,null];
  render();
}

const best=localStorage.getItem('mastermind-best');
if(best)document.getElementById('best').textContent=best+'s';
newGame();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Mastermind</h2><p>Errate den geheimen Farbcode. Nach jedem Versuch bekommst du Feedback:<br><br><b>Schwarz:</b> Richtige Farbe am richtigen Platz. <b>Weiß:</b> Richtige Farbe am falschen Platz. Du hast begrenzte Versuche!</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
