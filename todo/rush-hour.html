<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rush Hour</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#e0e0e0;flex-direction:column;gap:12px;user-select:none;padding:60px 20px 20px}
h1{font-size:1.6rem;letter-spacing:2px;color:#c9b458}
a.back-link{position:fixed;top:16px;left:16px;color:#c9b458;text-decoration:none;font-size:1.1rem;padding:6px 14px;border:1px solid #c9b458;border-radius:6px;background:#16213e;transition:background .2s;z-index:100}
a.back-link:hover{background:#0f3460}
.btn{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:6px;padding:6px 16px;font-size:.9rem;cursor:pointer;transition:background .2s}
.btn:hover{background:#0f3460}
canvas{border-radius:8px;cursor:grab}canvas:active{cursor:grabbing}
#msg{color:#c9b458;font-weight:bold;font-size:1.05rem;min-height:1.5em;text-align:center}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
.controls label{color:#888;font-size:.85rem}
.controls select{background:#16213e;color:#c9b458;border:1px solid #0f3460;border-radius:4px;padding:2px 6px}
#info{font-size:.9rem;color:#888}.val{color:#c9b458;font-weight:bold}

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>RUSH HOUR</h1>
<div class="controls">
<label>Level: <select id="sel-level" onchange="loadLevel()"></select></label>
<button class="btn" onclick="loadLevel()">Neustart</button>
</div>
<p id="msg">Schiebe das rote Auto zum Ausgang (rechts)!</p>
<canvas id="c" width="360" height="360"></canvas>
<p id="info">Züge: <span class="val" id="moves">0</span></p>

<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const GS=6,CS=60;
const COLORS=['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#e91e63','#00bcd4','#ff9800','#8bc34a','#795548','#607d8b','#cddc39'];

// Level format: [row,col,len,dir] dir: 'h'=horizontal, 'v'=vertical. First car is always the target (red)
const LEVELS=[
  // Beginner (2-3 moves)
  {name:'1',cars:[[2,0,2,'h'],[2,2,2,'v']]},
  {name:'2',cars:[[2,0,2,'h'],[1,2,2,'v'],[1,4,2,'v']]},
  // Easy (3-5 moves)
  {name:'3',cars:[[2,0,2,'h'],[0,0,3,'h'],[2,2,2,'v'],[4,1,3,'h']]},
  {name:'4',cars:[[2,0,2,'h'],[0,0,3,'h'],[2,2,2,'v'],[4,1,3,'h'],[2,4,2,'v']]},
  {name:'5',cars:[[2,0,2,'h'],[0,0,3,'h'],[1,3,2,'v'],[2,2,2,'v'],[3,4,2,'v'],[4,1,3,'h']]},
  // Medium (6-7 moves)
  {name:'6',cars:[[2,1,2,'h'],[3,1,2,'v'],[5,1,2,'h'],[4,3,2,'h'],[1,4,3,'v'],[1,5,2,'v'],[3,2,2,'h'],[1,0,3,'h'],[3,5,2,'v'],[1,3,2,'v'],[0,2,2,'h']]},
  {name:'7',cars:[[2,0,2,'h'],[3,3,2,'v'],[1,2,3,'v'],[0,5,3,'v'],[1,3,2,'h'],[5,1,3,'h'],[0,0,2,'v'],[3,0,2,'v'],[3,4,2,'v'],[3,1,2,'v']]},
  // Hard (8-10 moves)
  {name:'8',cars:[[2,1,2,'h'],[1,4,2,'v'],[0,0,2,'v'],[4,2,2,'h'],[3,4,2,'v'],[0,3,2,'h'],[0,2,2,'v'],[1,5,2,'v'],[1,3,3,'v'],[3,0,2,'h'],[5,0,2,'h']]},
  {name:'9',cars:[[2,1,2,'h'],[4,3,2,'h'],[3,0,2,'h'],[1,2,2,'h'],[3,2,2,'v'],[4,0,2,'h'],[0,4,3,'v'],[1,5,2,'v'],[5,2,2,'h'],[5,0,2,'h'],[0,1,3,'h']]},
  {name:'10',cars:[[2,0,2,'h'],[4,1,3,'h'],[1,2,2,'v'],[5,1,2,'h'],[0,2,3,'h'],[3,5,2,'v'],[0,5,2,'v'],[3,1,2,'h'],[1,3,3,'v']]},
];

let cars,moveCount,gameOver,dragging,dragStart,dragCar;

function init(){
  const sel=document.getElementById('sel-level');
  sel.innerHTML='';
  LEVELS.forEach((l,i)=>{const o=document.createElement('option');o.value=i;o.textContent=`Level ${l.name}`;sel.appendChild(o);});
  loadLevel();
}

function loadLevel(){
  const idx=parseInt(document.getElementById('sel-level').value);
  const level=LEVELS[idx];
  cars=level.cars.map((c,i)=>({row:c[0],col:c[1],len:c[2],dir:c[3],color:i===0?'#e74c3c':COLORS[(i)%COLORS.length]}));
  moveCount=0;gameOver=false;dragging=false;
  document.getElementById('moves').textContent=0;
  document.getElementById('msg').textContent='Schiebe das rote Auto zum Ausgang (rechts)!';
  draw();
}

function getGrid(){
  const g=Array.from({length:GS},()=>Array(GS).fill(-1));
  cars.forEach((c,i)=>{
    for(let s=0;s<c.len;s++){
      const r=c.dir==='v'?c.row+s:c.row;
      const cc=c.dir==='h'?c.col+s:c.col;
      if(r>=0&&r<GS&&cc>=0&&cc<GS)g[r][cc]=i;
    }
  });
  return g;
}

function draw(){
  ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid
  for(let r=0;r<GS;r++)for(let c=0;c<GS;c++){
    ctx.fillStyle='#16213e';ctx.fillRect(c*CS+1,r*CS+1,CS-2,CS-2);
  }
  // Exit marker
  ctx.fillStyle='#c9b458';
  ctx.fillRect(GS*CS-2,2*CS+10,6,CS-20);
  ctx.font='bold 12px Segoe UI';ctx.fillStyle='#c9b458';ctx.textAlign='center';
  ctx.fillText('EXIT',GS*CS+2,2*CS+CS/2+4);
  // Cars
  for(let i=0;i<cars.length;i++){
    const c=cars[i];
    const x=c.col*CS+3,y=c.row*CS+3;
    const w=c.dir==='h'?c.len*CS-6:CS-6;
    const h=c.dir==='v'?c.len*CS-6:CS-6;
    ctx.fillStyle=c.color;
    ctx.beginPath();ctx.roundRect(x,y,w,h,8);ctx.fill();
    // highlight
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.fillRect(x+4,y+4,w-8,Math.min(h-8,10));
  }
  if(gameOver){
    ctx.fillStyle='rgba(26,26,46,0.7)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#c9b458';ctx.font='bold 24px Segoe UI';ctx.textAlign='center';
    ctx.fillText('Gelöst!',canvas.width/2,canvas.height/2-10);
    ctx.font='16px Segoe UI';
    ctx.fillText(`${moveCount} Züge`,canvas.width/2,canvas.height/2+20);
  }
}

canvas.onmousedown=function(e){
  if(gameOver)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  const col=Math.floor(mx/CS),row=Math.floor(my/CS);
  const grid=getGrid();
  if(row<0||row>=GS||col<0||col>=GS||grid[row][col]<0)return;
  dragCar=grid[row][col];
  dragStart={x:mx,y:my,row:cars[dragCar].row,col:cars[dragCar].col};
  dragging=true;
};

canvas.onmousemove=function(e){
  if(!dragging)return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  const car=cars[dragCar];
  const dx=mx-dragStart.x,dy=my-dragStart.y;
  if(car.dir==='h'){
    const newCol=dragStart.col+Math.round(dx/CS);
    tryMove(dragCar,car.row,newCol);
  } else {
    const newRow=dragStart.row+Math.round(dy/CS);
    tryMove(dragCar,newRow,car.col);
  }
};

canvas.onmouseup=function(){
  if(dragging&&dragCar!==undefined){
    const car=cars[dragCar];
    if(car.row!==dragStart.row||car.col!==dragStart.col)moveCount++;
    document.getElementById('moves').textContent=moveCount;
    // Check win
    if(dragCar===0&&car.col+car.len>=GS){
      gameOver=true;
      document.getElementById('msg').textContent=`Gelöst in ${moveCount} Zügen!`;
    }
  }
  dragging=false;
  draw();
};

canvas.ontouchstart=function(e){e.preventDefault();const t=e.touches[0];canvas.onmousedown({clientX:t.clientX,clientY:t.clientY});};
canvas.ontouchmove=function(e){e.preventDefault();const t=e.touches[0];canvas.onmousemove({clientX:t.clientX,clientY:t.clientY});};
canvas.ontouchend=function(e){e.preventDefault();canvas.onmouseup();};

function tryMove(carIdx,newRow,newCol){
  const car=cars[carIdx];
  const grid=getGrid();
  // Clear current car from grid
  for(let s=0;s<car.len;s++){
    const r=car.dir==='v'?car.row+s:car.row;
    const c=car.dir==='h'?car.col+s:car.col;
    if(r>=0&&r<GS&&c>=0&&c<GS)grid[r][c]=-1;
  }
  // Clamp
  if(car.dir==='h'){
    const maxCol=carIdx===0?GS-car.len+1:GS-car.len;
    newCol=Math.max(0,Math.min(maxCol,newCol));
    // Step-by-step collision check
    if(newCol>car.col){
      for(let c=car.col+1;c<=newCol;c++){
        let blocked=false;
        for(let s=0;s<car.len;s++){
          if(c+s<GS&&grid[car.row][c+s]>=0){blocked=true;break;}
        }
        if(blocked){newCol=c-1;break;}
      }
    } else if(newCol<car.col){
      for(let c=car.col-1;c>=newCol;c--){
        let blocked=false;
        for(let s=0;s<car.len;s++){
          if(c+s<GS&&grid[car.row][c+s]>=0){blocked=true;break;}
        }
        if(blocked){newCol=c+1;break;}
      }
    }
  } else {
    newRow=Math.max(0,Math.min(GS-car.len,newRow));
    // Step-by-step collision check for vertical
    if(newRow>car.row){
      for(let r=car.row+1;r<=newRow;r++){
        let blocked=false;
        for(let s=0;s<car.len;s++){
          if(grid[r+s]&&grid[r+s][car.col]>=0){blocked=true;break;}
        }
        if(blocked){newRow=r-1;break;}
      }
    } else if(newRow<car.row){
      for(let r=car.row-1;r>=newRow;r--){
        let blocked=false;
        for(let s=0;s<car.len;s++){
          if(grid[r+s]&&grid[r+s][car.col]>=0){blocked=true;break;}
        }
        if(blocked){newRow=r+1;break;}
      }
    }
  }
  // Verify no collision
  let valid=true;
  for(let s=0;s<car.len;s++){
    const r=car.dir==='v'?newRow+s:newRow;
    const c=car.dir==='h'?newCol+s:newCol;
    if(r<0||r>=GS||(c<0)||(carIdx!==0&&c>=GS)){valid=false;break;}
    if(c<GS&&grid[r][c]>=0){valid=false;break;}
  }
  if(valid){car.row=newRow;car.col=newCol;}
  draw();
}

init();
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Rush Hour</h2><p>Verschiebe die Fahrzeuge auf dem Gitter, um dem <b>roten Auto</b> den Weg zum Ausgang freizumachen.<br><br><b>Steuerung:</b> Ziehe Fahrzeuge in ihrer Fahrtrichtung (horizontal/vertikal). Autos sind 2 Felder lang, LKWs 3.</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
