<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lights Out</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; flex-direction: column; gap: 18px; user-select: none; }
  h1 { font-size: 1.6rem; letter-spacing: 2px; color: #c9b458; }
  .controls { display: flex; gap: 10px; align-items: center; }
  .controls button { background: #16213e; color: #c9b458; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 16px; font-size: 0.9rem; cursor: pointer; }
  .controls button:hover { background: #0f3460; }
  .controls button.active { background: #c9b458; color: #1a1a2e; }
  #board { display: inline-grid; gap: 4px; background: #16213e; border: 2px solid #0f3460; border-radius: 12px; padding: 12px; }
  .cell { width: 60px; height: 60px; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
  .cell.on { background: #c9b458; box-shadow: 0 0 16px rgba(201, 180, 88, 0.5); border-color: #ddd09a; }
  .cell.off { background: #0f1a30; border-color: #0f3460; }
  .cell:hover { transform: scale(1.05); }
  #info { display: flex; gap: 24px; font-size: 1rem; }
  .val { color: #c9b458; font-weight: bold; }
  #msg { color: #c9b458; font-weight: bold; font-size: 1.2rem; min-height: 1.5em; }
  a.back-link { position: fixed; top: 16px; left: 16px; color: #c9b458; text-decoration: none; font-size: 1.1rem; padding: 6px 14px; border: 1px solid #c9b458; border-radius: 6px; background: #16213e; transition: background 0.2s; z-index: 100; }
  a.back-link:hover { background: #0f3460; }
  .sub { color: #555; font-size: 0.8rem; }

.info-btn{position:fixed;top:16px;right:16px;color:#c9b458;font-size:1.3rem;width:36px;height:36px;border:1px solid #c9b458;border-radius:50%;background:#16213e;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:background .2s;z-index:100;font-weight:bold;line-height:1}
.info-btn:hover{background:#0f3460}
.info-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;justify-content:center;align-items:center}
.info-modal-overlay.open{display:flex}
.info-modal{background:#16213e;border:1px solid #c9b458;border-radius:12px;padding:24px 28px;max-width:420px;width:90%;color:#e0e0e0;position:relative;max-height:80vh;overflow-y:auto;line-height:1.6;font-size:.9rem}
.info-modal h2{color:#c9b458;font-size:1.2rem;margin-bottom:12px}
.info-modal-close{position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:1.3rem;cursor:pointer;line-height:1}
.info-modal-close:hover{color:#c9b458}
</style>
</head>
<body>
<a class="back-link" href="spiele.html">&larr; Zurück</a>
<button class="info-btn" title="Anleitung">?</button>
<h1>LIGHTS OUT</h1>
<div class="controls">
  <button id="btn3" onclick="startGame(3)">3x3</button>
  <button id="btn5" onclick="startGame(5)" class="active">5x5</button>
  <button id="btn7" onclick="startGame(7)">7x7</button>
  <button onclick="startGame(currentSize)">Neu</button>
</div>
<div id="info">
  <span>Züge: <span class="val" id="moves">0</span></span>
  <span>Lichter an: <span class="val" id="remaining">0</span></span>
</div>
<div id="board"></div>
<p id="msg"></p>
<p class="sub">Klicke ein Feld — es und seine Nachbarn schalten um</p>

<script>
let currentSize = 5;
let grid = [];
let moves = 0;
let solved = false;

function startGame(size) {
  currentSize = size;
  solved = false;
  moves = 0;
  document.getElementById('msg').textContent = '';
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const btnId = 'btn' + size;
  document.getElementById(btnId)?.classList.add('active');

  // Start with all off, then do random clicks to ensure solvability
  grid = Array.from({ length: size }, () => Array(size).fill(false));
  const clicks = 8 + Math.floor(Math.random() * (size * size / 2));
  for (let i = 0; i < clicks; i++) {
    const r = Math.floor(Math.random() * size);
    const c = Math.floor(Math.random() * size);
    toggle(r, c, true);
  }
  // Ensure at least some are on
  if (grid.flat().filter(v => v).length === 0) {
    toggle(Math.floor(size / 2), Math.floor(size / 2), true);
  }

  updateUI();
  render();
}

function toggle(r, c, silent) {
  const dirs = [[0,0],[0,1],[0,-1],[1,0],[-1,0]];
  for (const [dr, dc] of dirs) {
    const nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < currentSize && nc >= 0 && nc < currentSize) {
      grid[nr][nc] = !grid[nr][nc];
    }
  }
}

function clickCell(r, c) {
  if (solved) return;
  toggle(r, c);
  moves++;
  updateUI();
  render();
  checkWin();
}

function checkWin() {
  if (grid.flat().some(v => v)) return;
  solved = true;
  document.getElementById('msg').textContent = `Gelöst in ${moves} Zügen!`;
}

function updateUI() {
  document.getElementById('moves').textContent = moves;
  document.getElementById('remaining').textContent = grid.flat().filter(v => v).length;
}

function render() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${currentSize}, 60px)`;
  board.innerHTML = '';
  for (let r = 0; r < currentSize; r++) {
    for (let c = 0; c < currentSize; c++) {
      const div = document.createElement('div');
      div.className = 'cell ' + (grid[r][c] ? 'on' : 'off');
      div.onclick = () => clickCell(r, c);
      board.appendChild(div);
    }
  }
}

startGame(5);
</script>

<div class="info-modal-overlay"><div class="info-modal"><button class="info-modal-close">&times;</button><h2>Lights Out</h2><p>Klicke auf eine Zelle, um sie und ihre direkten Nachbarn (oben, unten, links, rechts) umzuschalten.<br><br><b>Ziel:</b> Schalte alle Lichter aus!</p></div></div>
<script>
document.querySelector('.info-btn').onclick=()=>document.querySelector('.info-modal-overlay').classList.add('open');
document.querySelector('.info-modal-close').onclick=()=>document.querySelector('.info-modal-overlay').classList.remove('open');
document.querySelector('.info-modal-overlay').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');};</script>
</body>
</html>
