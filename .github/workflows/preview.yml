name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.compute-url.outputs.url }}
    env:
      WORKER_NAME: minispiele-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Deploy preview worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ env.WORKER_NAME }}
      - name: Compute preview URL
        id: compute-url
        env:
          WORKERS_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
        run: |
          if [ -n "$WORKERS_SUBDOMAIN" ]; then
            echo "url=https://${WORKER_NAME}.${WORKERS_SUBDOMAIN}.workers.dev" >>"$GITHUB_OUTPUT"
          fi
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          WORKERS_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
        with:
          script: |
            const subdomain = process.env.WORKERS_SUBDOMAIN;
            const workerName = process.env.WORKER_NAME;
            const marker = '<!-- preview-deploy-comment -->';
            const sha = context.sha.slice(0, 7);
            const urlLine = subdomain
              ? `→ https://${workerName}.${subdomain}.workers.dev`
              : `→ Worker \`${workerName}\` deployed. Setze Secret \`CLOUDFLARE_WORKERS_SUBDOMAIN\`, damit die URL hier auftaucht.`;
            const body = `${marker}\n🚀 **Preview-Deploy**\n\n${urlLine}\n\nCommit \`${sha}\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  lighthouse:
    needs: deploy
    if: needs.deploy.outputs.preview_url != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse CI (mobile)
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.deploy.outputs.preview_url }}/
            ${{ needs.deploy.outputs.preview_url }}/ring-sort
            ${{ needs.deploy.outputs.preview_url }}/dice
            ${{ needs.deploy.outputs.preview_url }}/timer
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.github/lighthouserc.json
      - name: Comment Lighthouse scores
        if: always()
        uses: actions/github-script@v7
        env:
          MANIFEST: ${{ steps.lhci.outputs.manifest }}
          LINKS: ${{ steps.lhci.outputs.links }}
        with:
          script: |
            const marker = '<!-- lighthouse-comment -->';
            const links = process.env.LINKS ? JSON.parse(process.env.LINKS) : {};
            const lines = Object.entries(links).map(([url, report]) => `- [${url}](${report})`);
            const body = `${marker}\n📊 **Lighthouse (mobile)**\n\n${lines.join('\n') || 'Run completed.'}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
