name: PR Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      WORKER_NAME: minispiele-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Deploy preview worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name ${{ env.WORKER_NAME }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          WORKERS_SUBDOMAIN: ${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}
        with:
          script: |
            const subdomain = process.env.WORKERS_SUBDOMAIN;
            const workerName = process.env.WORKER_NAME;
            const marker = '<!-- preview-deploy-comment -->';
            const sha = context.sha.slice(0, 7);
            const urlLine = subdomain
              ? `→ https://${workerName}.${subdomain}.workers.dev`
              : `→ Worker \`${workerName}\` deployed. Setze Secret \`CLOUDFLARE_WORKERS_SUBDOMAIN\`, damit die URL hier auftaucht.`;
            const body = `${marker}\n🚀 **Preview-Deploy**\n\n${urlLine}\n\nCommit \`${sha}\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
