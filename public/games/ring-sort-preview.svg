<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Vorschau: Ringe sortieren">
  <rect width="640" height="360" rx="20" fill="#f1f5f9"/>

  <!-- Peg 1 (cx=80): red big, blue med, green small -->
  <rect x="77" y="80" width="6" height="220" rx="3" fill="#cbd5e1"/>
  <rect x="20" y="300" width="120" height="14" rx="6" fill="#475569"/>
  <rect x="30" y="270" width="100" height="24" rx="12" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <rect x="42" y="240" width="76" height="24" rx="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="55" y="210" width="50" height="24" rx="12" fill="#10b981" stroke="#047857" stroke-width="2"/>

  <!-- Peg 2 (cx=240): green big, red med, blue small -->
  <rect x="237" y="80" width="6" height="220" rx="3" fill="#cbd5e1"/>
  <rect x="180" y="300" width="120" height="14" rx="6" fill="#475569"/>
  <rect x="190" y="270" width="100" height="24" rx="12" fill="#10b981" stroke="#047857" stroke-width="2"/>
  <rect x="202" y="240" width="76" height="24" rx="12" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <rect x="215" y="210" width="50" height="24" rx="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>

  <!-- Peg 3 (cx=400): blue big, green med, red small -->
  <rect x="397" y="80" width="6" height="220" rx="3" fill="#cbd5e1"/>
  <rect x="340" y="300" width="120" height="14" rx="6" fill="#475569"/>
  <rect x="350" y="270" width="100" height="24" rx="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <rect x="362" y="240" width="76" height="24" rx="12" fill="#10b981" stroke="#047857" stroke-width="2"/>
  <rect x="375" y="210" width="50" height="24" rx="12" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>

  <!-- Peg 4 (cx=560): empty -->
  <rect x="557" y="80" width="6" height="220" rx="3" fill="#cbd5e1"/>
  <rect x="500" y="300" width="120" height="14" rx="6" fill="#475569"/>
</svg>
