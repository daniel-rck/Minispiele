<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="Wer wird Millionär Vorschau">
  <rect width="320" height="180" fill="#0f172a"/>
  <text x="160" y="30" text-anchor="middle" font-family="ui-sans-serif,system-ui" font-size="13" font-weight="800" fill="#fbbf24">Hauptstadt von Frankreich?</text>
  <g font-family="ui-sans-serif,system-ui" font-size="11" font-weight="700">
    <rect x="40" y="50" width="100" height="22" rx="6" fill="#1e293b" stroke="#475569"/>
    <text x="60" y="65" fill="#fbbf24" font-weight="800">A:</text>
    <text x="78" y="65" fill="#cbd5e1">London</text>
    <rect x="160" y="50" width="100" height="22" rx="6" fill="#1e293b" stroke="#475569"/>
    <text x="180" y="65" fill="#fbbf24" font-weight="800">B:</text>
    <text x="198" y="65" fill="#cbd5e1">Madrid</text>
    <rect x="40" y="78" width="100" height="22" rx="6" fill="#10b981" stroke="#10b981"/>
    <text x="60" y="93" fill="#fff" font-weight="800">C:</text>
    <text x="78" y="93" fill="#fff">Paris</text>
    <rect x="160" y="78" width="100" height="22" rx="6" fill="#1e293b" stroke="#475569"/>
    <text x="180" y="93" fill="#fbbf24" font-weight="800">D:</text>
    <text x="198" y="93" fill="#cbd5e1">Rom</text>
  </g>
  <g font-family="ui-sans-serif,system-ui" font-size="9" font-weight="700" text-anchor="end">
    <rect x="40" y="110" width="240" height="11" rx="2" fill="#1e293b"/>
    <text x="278" y="119" fill="#cbd5e1">15 · 1.000.000</text>
    <rect x="40" y="123" width="240" height="11" rx="2" fill="#92400e"/>
    <text x="278" y="132" fill="#fbbf24">10 · 32.000 (sicher)</text>
    <rect x="40" y="136" width="240" height="11" rx="2" fill="#fbbf24"/>
    <text x="278" y="145" fill="#0f172a">3 · 300 (jetzt)</text>
    <rect x="40" y="149" width="240" height="11" rx="2" fill="#1e293b"/>
    <text x="278" y="158" fill="#cbd5e1">1 · 50</text>
  </g>
</svg>
