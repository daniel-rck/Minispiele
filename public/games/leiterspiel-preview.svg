<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="Leiterspiel Vorschau">
  <rect width="320" height="180" fill="#020617"/>
  <g transform="translate(95,15)">
    <!-- 5x5 simplified preview grid -->
    <g>
      <rect x="0"   y="0"   width="30" height="30" fill="#1a2a4e"/>
      <rect x="30"  y="0"   width="30" height="30" fill="#16213e"/>
      <rect x="60"  y="0"   width="30" height="30" fill="#1a2a4e"/>
      <rect x="90"  y="0"   width="30" height="30" fill="#16213e"/>
      <rect x="120" y="0"   width="30" height="30" fill="#1a2a4e"/>

      <rect x="0"   y="30"  width="30" height="30" fill="#16213e"/>
      <rect x="30"  y="30"  width="30" height="30" fill="#1a2a4e"/>
      <rect x="60"  y="30"  width="30" height="30" fill="#16213e"/>
      <rect x="90"  y="30"  width="30" height="30" fill="#1a2a4e"/>
      <rect x="120" y="30"  width="30" height="30" fill="#16213e"/>

      <rect x="0"   y="60"  width="30" height="30" fill="#1a2a4e"/>
      <rect x="30"  y="60"  width="30" height="30" fill="#16213e"/>
      <rect x="60"  y="60"  width="30" height="30" fill="#1a2a4e"/>
      <rect x="90"  y="60"  width="30" height="30" fill="#16213e"/>
      <rect x="120" y="60"  width="30" height="30" fill="#1a2a4e"/>

      <rect x="0"   y="90"  width="30" height="30" fill="#16213e"/>
      <rect x="30"  y="90"  width="30" height="30" fill="#1a2a4e"/>
      <rect x="60"  y="90"  width="30" height="30" fill="#16213e"/>
      <rect x="90"  y="90"  width="30" height="30" fill="#1a2a4e"/>
      <rect x="120" y="90"  width="30" height="30" fill="#16213e"/>

      <rect x="0"   y="120" width="30" height="30" fill="#1a2a4e"/>
      <rect x="30"  y="120" width="30" height="30" fill="#16213e"/>
      <rect x="60"  y="120" width="30" height="30" fill="#1a2a4e"/>
      <rect x="90"  y="120" width="30" height="30" fill="#16213e"/>
      <rect x="120" y="120" width="30" height="30" fill="#1a2a4e"/>
    </g>

    <!-- Ladder up (green) -->
    <line x1="15" y1="135" x2="105" y2="15" stroke="#22c55e" stroke-width="3" stroke-dasharray="6 4"/>
    <text x="20" y="130" font-family="system-ui" font-size="14" font-weight="800" fill="#22c55e">↑</text>

    <!-- Snake down (red) -->
    <line x1="135" y1="35" x2="45" y2="135" stroke="#ef4444" stroke-width="3" stroke-dasharray="6 4"/>
    <text x="130" y="40" font-family="system-ui" font-size="14" font-weight="800" fill="#ef4444">↓</text>

    <!-- Tokens -->
    <circle cx="15"  cy="135" r="7" fill="#3b82f6" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="45"  cy="135" r="6" fill="#ef4444"/>
    <circle cx="75"  cy="135" r="6" fill="#22c55e"/>
    <circle cx="105" cy="135" r="6" fill="#eab308"/>
  </g>

  <!-- Die -->
  <rect x="20" y="120" width="40" height="40" rx="8" fill="#f8fafc" stroke="#fbbf24" stroke-width="2"/>
  <g fill="#0f172a">
    <circle cx="30" cy="130" r="3"/>
    <circle cx="50" cy="130" r="3"/>
    <circle cx="30" cy="150" r="3"/>
    <circle cx="50" cy="150" r="3"/>
  </g>
</svg>
