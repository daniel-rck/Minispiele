<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Vorschau: Hyperfokus">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1a1235"/>
      <stop offset="100%" stop-color="#06081a"/>
    </radialGradient>
    <radialGradient id="core" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" rx="20" fill="url(#bg)"/>
  <circle cx="320" cy="180" r="140" fill="url(#glow)"/>
  <circle cx="320" cy="180" r="100" fill="url(#core)" stroke="#ffffff" stroke-opacity="0.25" stroke-width="6"/>
  <circle cx="290" cy="155" r="22" fill="#ffffff" opacity="0.18"/>
  <text x="320" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="900" fill="#ffffff" letter-spacing="6">TIPP</text>

  <!-- Flying numbers -->
  <g font-family="system-ui, sans-serif" font-weight="800" opacity="0.95">
    <text x="160" y="120" font-size="28" fill="#fde047">+25</text>
    <text x="490" y="90" font-size="34" fill="#f0abfc">CRIT</text>
    <text x="510" y="220" font-size="22" fill="#a7f3d0">+12</text>
    <text x="120" y="240" font-size="26" fill="#fbbf24">BONUS</text>
    <text x="430" y="300" font-size="20" fill="#7dd3fc">+8</text>
  </g>

  <!-- Combo bar -->
  <rect x="40" y="40" width="240" height="14" rx="7" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="40" y="40" width="180" height="14" rx="7" fill="#f472b6"/>
  <text x="160" y="51" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="900" fill="#ffffff" letter-spacing="2">COMBO ×3</text>

  <!-- Coins counter -->
  <text x="40" y="86" font-family="system-ui, sans-serif" font-size="22" font-weight="900" fill="#ffffff">42.7k</text>
  <text x="40" y="100" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" fill-opacity="0.6" letter-spacing="2">COINS</text>

  <!-- Sparkles -->
  <g fill="#fde047">
    <circle cx="220" cy="100" r="3"/>
    <circle cx="450" cy="160" r="2.5"/>
    <circle cx="380" cy="80" r="2"/>
    <circle cx="260" cy="280" r="2.5"/>
    <circle cx="200" cy="160" r="2"/>
    <circle cx="460" cy="260" r="3"/>
  </g>
</svg>
