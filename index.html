<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#11b3b3" />
    <meta
      name="description"
      content="Spielwiese — kleine Browser-Spiele. Lokal, ohne Account, ohne Tracking."
    />
    <title>Spielwiese</title>
    <script>
      // Avoid theme flash: set data-theme synchronously before React mounts.
      (function () {
        try {
          var stored = localStorage.getItem('minispiele.ui.theme.v1');
          var mode = stored ? JSON.parse(stored) : 'system';
          var resolved =
            mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
              ? 'dark'
              : 'light';
          document.documentElement.dataset.theme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#0a1014' : '#11b3b3');
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
